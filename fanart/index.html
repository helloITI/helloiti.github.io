<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>※⁜ helloT seal fanart ⁜※</title>
  <link rel="icon" type="image/png" href="https://helloiti.github.io/assets/deez.png">
  <style>
    @font-face {
      font-family: 'NintendoNTLG';
      src: url('https://helloiti.github.io/assets/nintendo_NTLG-DB_002.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    body {
      font-family: 'NintendoNTLG', sans-serif;
      margin: 0;
      padding: 20px;
      background-image: url('https://helloiti.github.io/assets/galaxy.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: url('https://hellot.nekoweb.org/assets/Wii.png') 16 16, auto;
    }
    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 30px;
    }
    .img-bx {
      background: rgba(0, 0, 0, 0.6);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 20px;
      width: 1300px;
      min-height: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .img-cnt {
      position: relative;
      display: inline-block;
    }
    .img-cnt img {
      max-width: 210px;
      max-height: 200px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.2s;
    }
    .img-cnt img:hover {
      transform: scale(1.03);
    }
    .hv-txt {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 0.9rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .img-cnt:hover .hv-txt {
      opacity: 1;
    }
      .corner-link {
      position: absolute;
      top: 10px;
      right: 10px;
      color: white !important;
      font-size: 12px;
      text-decoration: none;
      background: none !important;
      -webkit-text-fill-color: white !important;
    }
    .corner-link:hover {
      text-decoration: underline;
    }
body {
  overflow-y: scroll;
}
body::-webkit-scrollbar {
  display: none;
}
/* credits to RFGuy (https://rfguy.nekoweb.org) for this code! */
.nv-br {
  background-color: rgb(209 79 79);
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: auto; /* important */
  max-width: 95%; /* prevents overflow */
  padding: 12px 20px; /* smaller so it fits */
  border-radius: 0 0 12px 12px;
  outline: 4px solid #9e2222;
  display: flex;
  flex-wrap: wrap; /* allows wrapping */
  justify-content: center;
  gap: 8px;
  z-index: 11;
}
  </style>
</head>
<body>
  <h1> helloT seal fanart </h1>
<a href="https://helloiti.github.io" class="corner-link">Go Back?</a>
<div class="img-bx">
  <div class="img-cnt">
    <img src="https://helloiti.github.io/assets/seal1.png" alt="fanart 1">
    <div class="hv-txt">⁜ made by: @hellot.pnid ⁜</div>
  </div>
  <div class="img-cnt">
    <img src="https://helloiti.github.io/assets/seal2.png" alt="fanart 2">
    <div class="hv-txt">⁜ made by: @leggytheglitch ⁜</div>
  </div>
  <div class="img-cnt">
    <img src="https://helloiti.github.io/assets/asdsadsdasdasdsa.png" alt="fanart 3">
    <div class="hv-txt">⁜ made by: @rabbid_bwah ⁜</div>
  </div>
  <div class="img-cnt">
    <img src="https://helloiti.github.io/assets/seal4.png" alt="fanart 4">
    <div class="hv-txt">⁜ made by: @tylerblu2103 ⁜</div>
  </div>
  <div class="img-cnt">
    <img src="https://helloiti.github.io/assets/seal5.png" alt="fanart 5">
    <div class="hv-txt">※⁜ made by: @arafergirl ⁜※</div>
  </div>
</div>
<audio id="FUCK-YOU" loop>
  <source src="https://helloiti.github.io/assets/seal_song.mp3" type="audio/mpeg">
</audio>
<script>
  document.addEventListener("click", function playMusic() {
    const audio = document.getElementById("FUCK-YOU");
    audio.play().catch(err => console.log(err));
    
    document.removeEventListener("click", playMusic);
  });
</script>
  <meta property="og:title" content="※⁜ helloT seal fanart ⁜※" />
  <meta property="og:description" content="⁜ Art ⁜" />
  <meta property="og:url" content="https://helloiti.github.io/fanart" />
  <meta property="og:image" content="https://helloiti.github.io/assets/deez.png" />
  <meta property="og:type" content="website" />
</body>
</html>
