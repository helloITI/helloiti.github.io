<!DOCTYPE HTML>
<html style="height: 100%; margin: 0; padding: 0;">
<head>
  <meta name="viewport" content="width=device-width, minimum-scale=0.1">
  <meta charset="utf-8">
  <title>♪</title>

  <script>
    alert("🦭"); // 😱

  <style>
body {
  margin: 0;
}

@media not print {
  .fullZoomOut {
    cursor: zoom-out;
  }

  .fullZoomIn {
    cursor: zoom-in;
  }

  .shrinkToFit {
    cursor: zoom-in;
  }

  .overflowingVertical,
  .overflowingHorizontalOnly {
    cursor: zoom-out;
  }
}

.isInObjectOrEmbed {
  width: 100%;
  height: 100vh;
}

img {
  display: block;
}
  </style>
	
<style>
@media not print {
  :root {
    color: #eee;
    background: url("chrome://global/skin/media/imagedoc-darknoise.png") fixed;
  }

  img.transparent {
    color: #222;
    background: hsl(0, 0%, 90%) url("chrome://global/skin/media/imagedoc-lightnoise.png");
  }

  img {
    text-align: center;
    position: absolute;
    inset: 0;
    margin: auto;
  }

  img.overflowingVertical {
    margin-top: 0;
  }

  .completeRotation {
    transition: transform 0.3s ease 0s;
  }
}

img {
  image-orientation: from-image;
}
</style>
	
</head>

	file explorer: -->

    class="fullscreen"
    src="a.png"
    alt="file explorer" 
    title="file explorer">
    
</body>
