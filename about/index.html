<!DOCTYPE HTML>
<html style="height: 100%; margin: 0; padding: 0;">
<head>
  <meta name="viewport" content="width=device-width, minimum-scale=0.1">
  <meta charset="utf-8">
  <title>♪</title>

  <script>
    alert("🦭"); // 😱
    console.log("🦭") // 🥶
  </script>

  <style>
    :root {
      --bg: hsl(0, 0%, 90%);
    }

    html, body {
      height: 100%;
      margin: 0;
      background-color: var(--bg);
    }

    img.fullscreen {
      width: 100%;
      height: 100%;
      object-fit: contain; 
      display: block;
      user-select: none;
      background-color: var(--bg);
    }
  </style>
  
</head>

<body>
	<!-- file explorer is so useful!
	file explorer: -->
	
  <img
    class="fullscreen"
    src="https://hellot.nekoweb.org/about/a.png"
    alt="file explorer" 
    title="file explorer">
    
</body>
</html>
