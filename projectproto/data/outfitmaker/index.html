<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PRP, outfit tester demo</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; }
  #controls {
    position: absolute; top: 10px; left: 10px;
    padding: 10px; background: rgba(0,0,0,0.6);
    border-radius: 8px; color: white; font-family: sans-serif;
    z-index: 10;
  }
  #controls input, #controls select { display: block; margin: 5px 0; }
</style>
</head>
<body>
<div id="controls">
  <label>Gender:
    <select id="genderSelect">
      <option value="m">Male</option>
      <option value="f">Female</option>
    </select>
  </label>
  <label>Torso Texture: <input type="file" id="torsoUpload" accept="image/*"></label>
  <label>Legs Texture: <input type="file" id="legsUpload" accept="image/*"></label>
  <label>Arms Texture: <input type="file" id="armsUpload" accept="image/*"></label>
  <label>Animation:
    <select id="animSelect">
      <option value="">None</option>
      <option value="backflip">Backflip</option>
      <option value="dance">Dance</option>
      <option value="sit2">Sit</option>
      <option value="walk">Walk</option>
      <option value="gas">Gas</option>
    </select>
  </label>
</div>
<script src="https://cdn.jsdelivr.net/gh/imaya/zlib.js@master/bin/inflate.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r110/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r110/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r110/examples/js/controls/OrbitControls.js"></script>
<script>
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1.5, 3);
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  const light = new THREE.AmbientLight(0xffffff, 0.9);
  scene.add(light);
  let model;
  let gender = "m";
  const gltfLoader = new THREE.GLTFLoader();
  let mixer;
  let currentAction;
  const clock = new THREE.Clock();
  gltfLoader.load(

'https://mt-tools.nekoweb.org/projectproto/model/outfitroot.glb',
    function (gltf) {
      model = gltf.scene;
      const parent = new THREE.Group();
      parent.add(model);
      parent.scale.set(0.01, 0.01, 0.01);
      scene.add(parent);
      updateGenderVisibility();
    },
    undefined,
    function (err) { console.error(err); }
  );
  function updateGenderVisibility() {
    if(!model) return;
    model.traverse(function(child){
      if(child.isMesh){
        const name = child.name.toLowerCase();
        if(name.endsWith("_"+gender)) child.visible = true;
        else if(name.endsWith("_m") || name.endsWith("_f")) child.visible = false;
      }
    });
  }
  document.getElementById("genderSelect").addEventListener("change", function(e){
    gender = e.target.value;
    updateGenderVisibility();
  });
  function applyTexture(file, part){
    if(!file || !model) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      const texture = new THREE.TextureLoader().load(ev.target.result);
      model.traverse(function(child){
        if(child.isMesh && child.visible && child.name.toLowerCase().includes(part)){
        texture.flipY = false;
          child.material.map = texture;
          child.material.needsUpdate = true;
        }
      });
    };
    reader.readAsDataURL(file);
  }
  document.getElementById("torsoUpload").addEventListener("change", function(e){ applyTexture(e.target.files[0], "torso"); });
  document.getElementById("legsUpload").addEventListener("change", function(e){ applyTexture(e.target.files[0], "legs"); });
  document.getElementById("armsUpload").addEventListener("change", function(e){ applyTexture(e.target.files[0], "arms"); });
  const bgtexloader = new THREE.TextureLoader();
  bgtexloader.load('https://mt-tools.nekoweb.org/projectproto/graphics/bgslide_flower.png', function (loadedTexture) {
    loadedTexture.minFilter = THREE.NearestFilter;
    loadedTexture.magFilter = THREE.NearestFilter;
    loadedTexture.generateMipmaps = false;
    loadedTexture.wrapS = THREE.RepeatWrapping;
    loadedTexture.wrapT = THREE.RepeatWrapping;
    loadedTexture.repeat.set(1, 1);
    scene.background = loadedTexture;
  });
  document.getElementById("animSelect").addEventListener("change", function(e){
    const animName = e.target.value;
    if(!model) return;
    if(!animName){
      if(mixer) { mixer.stopAllAction(); mixer = null; currentAction = null; }
      return;
    }
    const url = `https://mt-tools.nekoweb.org/projectproto/model/anim/${animName}.glb`;
    gltfLoader.load(url, function(gltf){
      const clip = gltf.animations[0];
      if(!clip) return;
      if(!mixer) mixer = new THREE.AnimationMixer(model);
      if(currentAction) { currentAction.stop(); }
      currentAction = mixer.clipAction(clip);
      currentAction.reset().play();
    }, undefined, function(err){ console.error(err); });
  });
  window.addEventListener("resize", function(){
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  function animate(){
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    if(mixer) mixer.update(delta);
    renderer.render(scene,camera);
  }
  animate();
</script>
</body>
</html>
