async function loadBaseMiis() {
  const urls = Array.from({ length: 19 }, (_, i) =>
    `data/miis/lookalike/${i + 1}`
  );

  const responses = await Promise.all(urls.map(u => fetch(u).then(r => r.json())));

  console.log("Loaded", responses.length, "base Miis");

  const container = document.createElement("div");
  container.style.display = "grid";
  container.style.gridTemplateColumns = "repeat(4, 1fr)";
  container.style.gap = "0px";
  container.style.width = "320px";
  document.body.appendChild(container);

  for (let i = 0; i < 12; i++) {
    // 1️⃣ Blend a random Mii
    const blended = blendMiiData(responses);
    applyMii(blended);

    // 2️⃣ Wait for render frames
    await waitForFrames(8);
    renderer.render(scene, camera);

    // 3️⃣ Create the preview image
    const img = document.createElement("img");
    img.src = renderer.domElement.toDataURL();
    img.style.width = '80px';
    img.style.height = '80px';
    img.style.display = 'block';
    img.style.imageRendering = 'pixelated'; // crucial for pixel art
    img.className = 'mii';

    // 4️⃣ Store the blended data in the image element
    img.dataset.mii = JSON.stringify(blended);

    img.addEventListener("click", () => {
      localStorage.setItem("PRP_Chosen_Lookalike", img.dataset.mii);
    });

    // 6️⃣ Add to container
    container.appendChild(img);
  }
}

// Helper: wait for N frames
function waitForFrames(n) {
  return new Promise(resolve => {
    let count = 0;
    function step() {
      count++;
      if (count >= n) resolve();
      else requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

function blendMiiData(miis) {
  const blend = {};
  const keys = Object.keys(miis[0]);
  keys.forEach(key => {
    const randomMii = miis[Math.floor(Math.random() * miis.length)];
    blend[key] = randomMii[key];
  });
  return blend;
}

  async function loadGLBFromZip(path) {
    const file = zip.file(path);
    if (file) {
    const buffer = await file.async('arraybuffer');
    return new Promise((resolve, reject) => {
      loader.parse(buffer, '', gltf => resolve(gltf.scene), reject);
    });
    }
  }
  
async function loadAnimationsFromGLB(url) {
  const loader = new THREE.GLTFLoader();
  return new Promise((resolve, reject) => {
    loader.load(url, gltf => {
      resolve(gltf.animations || []);
    }, undefined, reject);
  });
}

async function SetGlasses(glasses) {
  const glassesKey = `proto_facelib/txt/glasses/${glasses + '.png'}`;
  const imageSrc = zipImages.glasses[glassesKey];

  const image = new Image();
  image.crossOrigin = "anonymous";
  image.src = imageSrc;

  image.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = image.width;
    canvas.height = image.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(image, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const glacol = hexToRgb(glassesColorHex);
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];
      if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
        data[i] = glacol.r;
        data[i + 1] = glacol.g;
        data[i + 2] = glacol.b;
      }
    }
    ctx.putImageData(imageData, 0, 0);
    const texture = new THREE.Texture(canvas);
    texture.flipY = false;
    texture.minFilter = THREE.NearestFilter;
    texture.magFilter = THREE.NearestFilter;
    texture.needsUpdate = true;

    const newMaterial = new THREE.MeshBasicMaterial({
      map: texture,
      transparent: true,
    });
    glassMesh.position.y = 0.6+(-LIB_Glass_PosY/50);
    glassMesh.position.z = -0.5
    const baseScale = 1.0 + (LIB_Glass_Scale / 30);
    glassMesh.scale.set(baseScale, baseScale, baseScale); 

    glassMesh.traverse((child) => {
      if (child.isMesh) {
        child.material = newMaterial;
        child.material.needsUpdate = true;
      }
    });
  };
}

function recolorStache(imageData, hairColorRGB) {
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];
    const a = data[i + 3];
    if (r > 200 && g < 80 && b < 80 && a > 0) {
      data[i] = hairColorRGB.r;
      data[i + 1] = hairColorRGB.g;
      data[i + 2] = hairColorRGB.b;
    }
  }
}

      if (headTexture) {

            child.material.needsUpdate = true;

  async function loadImages(zipFile, files) {
    const imageMap = {};
    for (let fileName of files) {
      const blob = await zipFile.files[fileName].async("blob");
      const url = URL.createObjectURL(blob);
      imageMap[fileName] = url;
    }
    return imageMap;
  }

  function colorMatchWithTolerance(r, g, b, tr, tg, tb, tolerance = 150) {
    return (
      Math.abs(r - tr) <= tolerance &&
      Math.abs(g - tg) <= tolerance &&
      Math.abs(b - tb) <= tolerance
    );
  }

function hexToRgb(hex) {
  if (typeof hex === 'number') {
    hex = hex.toString(16).padStart(6, '0');
  } else if (typeof hex === 'string') {
    hex = hex.replace('#', '');
  } else {
    return { r: 0, g: 0, b: 0 };
  }
  if (hex.length !== 6) {
    return { r: 0, g: 0, b: 0 };
  }
  const num = parseInt(hex, 16);
  return {
    r: (num >> 16) & 255,
    g: (num >> 8) & 255,
    b: num & 255
  };
}


function recolorIris(imageData) {
  const data = imageData.data;
  const white = { r: 255, g: 255, b: 255 };
  const brown = { r: 0x4C, g: 0x40, b: 0x32 };
  const eyeColor = hexToRgb(eyeColorHex);

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    if (colorMatchWithTolerance(r, g, b, 0, 255, 0)) {
      data[i] = white.r;
      data[i + 1] = white.g;
      data[i + 2] = white.b;

    } else if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
      data[i] = brown.r;
      data[i + 1] = brown.g;
      data[i + 2] = brown.b;

    } else if (colorMatchWithTolerance(r, g, b, 0, 0, 255)) {
      data[i] = eyeColor.r;
      data[i + 1] = eyeColor.g;
      data[i + 2] = eyeColor.b;
    }
  }
}
