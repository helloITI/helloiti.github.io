function updateBodyScale(he,we) {
  const height = parseFloat(he);

  if (bodyMesh) {
    const baseScale = 0.1;
    const scaleX = -baseScale * weight * height;
    const scaleY = baseScale * height;
    const scaleZ = baseScale * weight * height;
    bodyMesh.scale.set(scaleX, scaleY, scaleZ);

    let cameraY = height + 0.5;

    const minY = 1;
    const maxY = 5;
    camera.position.y = Math.max(minY, Math.min(maxY, cameraY));
  }

async function SetGlasses(glasses) {
  const glassesKey = `proto_facelib/txt/glasses/${glasses + '.png'}`;
  const imageSrc = zipImages.glasses[glassesKey];

  const image = new Image();
  image.crossOrigin = "anonymous";
  image.src = imageSrc;

  image.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = image.width;
    canvas.height = image.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(image, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const glacol = hexToRgb(glassesColorHex);
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];
      if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
        data[i] = glacol.r;
        data[i + 1] = glacol.g;
        data[i + 2] = glacol.b;
      }
    }
    ctx.putImageData(imageData, 0, 0);
    const texture = new THREE.Texture(canvas);
    texture.flipY = false;
    texture.minFilter = THREE.NearestFilter;
    texture.magFilter = THREE.NearestFilter;
    texture.needsUpdate = true;

    const newMaterial = new THREE.MeshBasicMaterial({
      map: texture,
      transparent: true,
    });
    glassMesh.position.y = 0.6+(-LIB_Glass_PosY/50);
    glassMesh.position.z = -0.5
    const baseScale = 1.0 + (LIB_Glass_Scale / 30);
    glassMesh.scale.set(baseScale, baseScale, baseScale); 

    glassMesh.traverse((child) => {
      if (child.isMesh) {
        child.material = newMaterial;
        child.material.needsUpdate = true;
      }
    });
  };
}

// Function to compute Eye Aspect Ratio (EAR)
function getEyeAspectRatio(eyeLandmarks) {
  const p1 = eyeLandmarks[1]; // top
  const p5 = eyeLandmarks[5]; // bottom
  const p2 = eyeLandmarks[2]; // inner vertical
  const p4 = eyeLandmarks[4]; // outer vertical

  const horizontalDist = Math.hypot(
    eyeLandmarks[0].x - eyeLandmarks[3].x,
    eyeLandmarks[0].y - eyeLandmarks[3].y
  );

  const verticalDist = Math.hypot(p1.x - p5.x, p1.y - p5.y) + Math.hypot(p2.x - p4.x, p2.y - p4.y);

  return verticalDist / (2.0 * horizontalDist);
}

// --- Update face on each frame ---
faceMeshA.onResults(results => {
  if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;

  const lm = results.multiFaceLandmarks[0];

  const leftEyePoint = lm[33];
  const rightEyePoint = lm[263];
  const nose = lm[1];

  const eyeDX = rightEyePoint.x - leftEyePoint.x;
  const eyeDY = rightEyePoint.y - leftEyePoint.y;
// Compute head rotation
const yaw = -1 * (nose.x - (leftEyePoint.x + rightEyePoint.x) / 2) * 2; // invert X
const pitch = (nose.y - (leftEyePoint.y + rightEyePoint.y) / 2) * 2;
const roll = Math.atan2(eyeDY, eyeDX);

// Update global variables
LIB_HeadYaw = yaw * 50;
LIB_HeadPitch = pitch * 50;
LIB_HeadRoll = roll * 30;

// Apply to head bone
if (headBone) {
  const smoothing = 0.2;
  headBone.rotation.x += (pitch - headBone.rotation.x) * smoothing;
  headBone.rotation.y += (yaw - headBone.rotation.y) * smoothing;
  headBone.rotation.z += (roll - headBone.rotation.z) * smoothing;
}

  const rightEAR = getEyeAspectRatio(rightEyePoints);

async function SetGlasses(glasses) {
  const glassesKey = `proto_facelib/txt/glasses/${glasses + '.png'}`;
  const imageSrc = zipImages.glasses[glassesKey];

  const image = new Image();
  image.crossOrigin = "anonymous";
  image.src = imageSrc;

  image.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = image.width;
    canvas.height = image.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(image, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const glacol = hexToRgb(glassesColorHex);
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];
      if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
        data[i] = glacol.r;
        data[i + 1] = glacol.g;
        data[i + 2] = glacol.b;
      }
    }
    ctx.putImageData(imageData, 0, 0);
    const texture = new THREE.Texture(canvas);
    texture.flipY = false;
    texture.minFilter = THREE.NearestFilter;
    texture.magFilter = THREE.NearestFilter;
    texture.needsUpdate = true;

    const newMaterial = new THREE.MeshBasicMaterial({
      map: texture,
      transparent: true,
    });
    glassMesh.position.y = 0.6+(-LIB_Glass_PosY/50);
    glassMesh.position.z = -0.5
    const baseScale = 1.0 + (LIB_Glass_Scale / 30);
    glassMesh.scale.set(baseScale, baseScale, baseScale); 

    glassMesh.traverse((child) => {
      if (child.isMesh) {
        child.material = newMaterial;
        child.material.needsUpdate = true;
      }
    });
  };
}

/** Draw all face components safely after images are loaded */
function drawFaceComponents(preset = {}) {

  // Clear canvas
  faceComposeCtx.setTransform(1, 0, 0, 1, 0, 0);
  faceComposeCtx.clearRect(0, 0, faceComposeCanvas.width, faceComposeCanvas.height);

  /** Utility to safely create canvas and get ImageData */
  function safeCanvas(img, recolorFunc) {
    if (!img || !img.complete || img.naturalWidth <= 0 || img.naturalHeight <= 0) return null;

    const canvas = document.createElement('canvas');
    const w = img.naturalWidth;
    const h = img.naturalHeight;
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);

    if (recolorFunc) {
      try {
        const data = ctx.getImageData(0, 0, w, h);
        recolorFunc(data);
        ctx.putImageData(data, 0, 0);
      } catch (e) {
        console.warn("getImageData failed for image", img.src, e);
      }
    }
    return canvas;
  }

  // === EYES ===
  const eyeCanvas = safeCanvas(eyeImg, eyestyle !== '51.png' ? recolorIris : null);
  if (eyeCanvas) {
    // Right eye
    faceComposeCtx.save();
    faceComposeCtx.translate(140 + LIB_Eye_PosX + EX_LIB_Eye_PosX + eyeCanvas.width / 2, 
                             60 + LIB_Eye_PosY + EX_LIB_Eye_PosY + eyeCanvas.height / 2);
    faceComposeCtx.scale(1 + (LIB_Eye_Scale / 30), 1 + (LIB_Eye_Scale / 30));
    faceComposeCtx.rotate(LIB_Eye_Rot / 30);
    faceComposeCtx.drawImage(eyeCanvas, -eyeCanvas.width / 2, -eyeCanvas.height / 2);
    faceComposeCtx.restore();

    // Left eye (mirrored)
    faceComposeCtx.save();
    faceComposeCtx.translate(10 - LIB_Eye_PosX + EX_LIB_Eye_PosX + eyeCanvas.width / 2,
                             60 + LIB_Eye_PosY + EX_LIB_Eye_PosY + eyeCanvas.height / 2);
    faceComposeCtx.scale(-1 - (LIB_Eye_Scale / 30), 1 + (LIB_Eye_Scale / 30));
    faceComposeCtx.rotate((LIB_Eye_Rot + EX_LIB_Eye_Rot) / 30);
    faceComposeCtx.drawImage(eyeCanvas, -eyeCanvas.width / 2, -eyeCanvas.height / 2);
    faceComposeCtx.restore();
  }

  // === MOUTH ===
  const mouthCanvas = safeCanvas(mouthImg, recolorMouth);
  if (mouthCanvas) {
    const mouthScale = 1.5 + (LIB_Mouth_Scale / 30);
    faceComposeCtx.save();
    faceComposeCtx.translate(104 + mouthCanvas.width / 2, 170 + LIB_Mouth_PosY + EX_LIB_Mouth_PosY + mouthCanvas.height / 2);
    faceComposeCtx.scale(mouthScale, mouthScale);
    faceComposeCtx.drawImage(mouthCanvas, -mouthCanvas.width / 2, -mouthCanvas.height / 2);
    faceComposeCtx.restore();
  }

  // === NOSE ===
  const noseCanvas = safeCanvas(noseImg, null);
  if (noseCanvas) {
    const noseScale = 0.8 + (LIB_Nose_Scale / 50);
    faceComposeCtx.save();
    faceComposeCtx.translate(45 + noseCanvas.width / 2, 60 + LIB_Nose_PosY + noseCanvas.height / 2);
    faceComposeCtx.scale(noseScale, noseScale);
    faceComposeCtx.drawImage(noseCanvas, -noseCanvas.width / 2, -noseCanvas.height / 2);
    faceComposeCtx.restore();
  }

  // === MUSTACHE ===
  const stacheCanvas = safeCanvas(musImg, img => recolorStache(img, hexToRgb(haircolor)));
  if (stacheCanvas) {
    faceComposeCtx.drawImage(stacheCanvas, 95, 145 + LIB_Stache_PosY, stacheCanvas.width, stacheCanvas.height);
  }

  // === EYEBROWS ===
  const browCanvas = safeCanvas(eyebrowImg, recolorBrow);
  if (browCanvas) {
    const browRotation = (LIB_Brow_Rot + EX_LIB_Brow_Rot) / 30;

    // Right brow
    faceComposeCtx.save();
    faceComposeCtx.translate(140 + LIB_Brow_PosX + EX_LIB_Brow_PosX + browCanvas.width / 2,
                             40 + LIB_Brow_PosY + EX_LIB_Brow_PosY + browCanvas.height / 2);
    faceComposeCtx.scale(1 + (LIB_Brow_Scale / 30), 1 + (LIB_Brow_Scale / 30));
    faceComposeCtx.rotate(browRotation);
    faceComposeCtx.drawImage(browCanvas, -browCanvas.width / 2, -browCanvas.height / 2);
    faceComposeCtx.restore();

    // Left brow (mirrored)
    faceComposeCtx.save();
    faceComposeCtx.translate(30 - LIB_Brow_PosX + EX_LIB_Brow_PosX + browCanvas.width / 2,
                             40 + LIB_Brow_PosY + EX_LIB_Brow_PosY + browCanvas.height / 2);
    faceComposeCtx.scale(-1 - (LIB_Brow_Scale / 30), 1 + (LIB_Brow_Scale / 30));
    faceComposeCtx.rotate(browRotation);
    faceComposeCtx.drawImage(browCanvas, -browCanvas.width / 2, -browCanvas.height / 2);
    faceComposeCtx.restore();
  }

  // === MOLE ===
  const moleCanvas = safeCanvas(molImg, null);
  if (moleCanvas) {
    faceComposeCtx.drawImage(moleCanvas, 60 + LIB_Mole_PosX, 175 + LIB_Mole_PosY,
                             moleCanvas.width / 2.5 + (LIB_Mole_Scale / 30),
                             moleCanvas.height / 2.5 + (LIB_Mole_Scale / 30));
  }

  // Update Three.js texture if needed
  if (faceTexture) {
    faceTexture.minFilter = THREE.NearestFilter;
    faceTexture.magFilter = THREE.NearestFilter;
    faceTexture.needsUpdate = true;
  }
  if (wrapMesh) {
    wrapMesh.traverse(child => {
      if (child.isMesh) {
        child.material.map = faceTexture;
        child.material.needsUpdate = true;
      }
    });
  }
}

function hexToRgb(hex) {
  if (typeof hex === 'number') {
    hex = hex.toString(16).padStart(6, '0');
  } else if (typeof hex === 'string') {
    hex = hex.replace('#', '');
  } else {
    return { r: 0, g: 0, b: 0 };
  }
  if (hex.length !== 6) {
    return { r: 0, g: 0, b: 0 };
  }
  const num = parseInt(hex, 16);
  return {
    r: (num >> 16) & 255,
    g: (num >> 8) & 255,
    b: num & 255
  };
}


function recolorIris(imageData) {
  const data = imageData.data;
  const white = { r: 255, g: 255, b: 255 };
  const brown = { r: 0x4C, g: 0x40, b: 0x32 };
  const eyeColor = hexToRgb(eyeColorHex);

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    if (colorMatchWithTolerance(r, g, b, 0, 255, 0)) {
      data[i] = white.r;
      data[i + 1] = white.g;
      data[i + 2] = white.b;

    } else if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
      data[i] = brown.r;
      data[i + 1] = brown.g;
      data[i + 2] = brown.b;

    } else if (colorMatchWithTolerance(r, g, b, 0, 0, 255)) {
      data[i] = eyeColor.r;
      data[i + 1] = eyeColor.g;
      data[i + 2] = eyeColor.b;
    }
  }
}

function recolorBrow(imageData) {
  const data = imageData.data;
  const nrowColor = hexToRgb(browColorHex);

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
      data[i] = nrowColor.r;
      data[i + 1] = nrowColor.g;
      data[i + 2] = nrowColor.b;
  }
}
}

function recolorMouth(imageData) {
  const data = imageData.data;
  const baseColor = hexToRgb(lipcolor);
  const darkerColor = {
    r: Math.max(0, Math.floor(baseColor.r * 0.8)),
    g: Math.max(0, Math.floor(baseColor.g * 0.8)),
    b: Math.max(0, Math.floor(baseColor.b * 0.8))
  };
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];
    if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
      data[i] = baseColor.r;
      data[i + 1] = baseColor.g;
      data[i + 2] = baseColor.b;
    }
    else if (colorMatchWithTolerance(r, g, b, 0, 255, 0)) {
      data[i] = darkerColor.r;
      data[i + 1] = darkerColor.g;
      data[i + 2] = darkerColor.b;
    }

      eyeColorHex = data.eyeColorHex;
      haircolor   = data.haircolor;
      browColorHex= data.browColorHex;
      glasses_S   = data.glasses_S;
      glassesColorHex = data.glassesColorHex;
      skintone    = data.skintone;
      lipcolor    = data.lipcolor;
      molestyle   = data.molestyle;
      musstyle    = data.musstyle;

      LIB_Eye_PosX    = data.LIB_Eye_PosX;
      LIB_Eye_PosY    = data.LIB_Eye_PosY;
      LIB_Eye_Scale   = data.LIB_Eye_Scale;
      LIB_Eye_Rot     = data.LIB_Eye_Rot;

      LIB_Brow_PosX   = data.LIB_Brow_PosX;
      LIB_Brow_PosY   = data.LIB_Brow_PosY;
      LIB_Brow_Scale  = data.LIB_Brow_Scale;
      LIB_Brow_Rot    = data.LIB_Brow_Rot;

      LIB_Mouth_PosY  = data.LIB_Mouth_PosY;
      LIB_Mouth_Scale = data.LIB_Mouth_Scale;

      LIB_Nose_PosY   = data.LIB_Nose_PosY;
      LIB_Nose_Scale  = data.LIB_Nose_Scale;

      LIB_Glass_PosY  = data.LIB_Glass_PosY;
      LIB_Glass_Scale = data.LIB_Glass_Scale;

      LIB_Mole_PosX   = data.LIB_Mole_PosX;
      LIB_Mole_PosY   = data.LIB_Mole_PosY;
      LIB_Mole_Scale  = data.LIB_Mole_Scale;

      LIB_Stache_PosX   = data.LIB_Stache_PosX;
      LIB_Stache_PosY   = data.LIB_Stache_PosY;
      LIB_Stache_Scale  = data.LIB_Stache_Scale;

      if (data.height2 != null) {
        height = data.height2;
        weight = data.weight2;
      } else {
        height = 1;
        weight = 1;
      }

      firstName = data.firstName;
      lastName  = data.lastName;
      birthdate = data.birthdate;

      buildMiiHead(
        faceline, hairstyle, gender, haircolor, skintone,
        eyebrowstyle, eyestyle, mouthstyle, nosestyle, detailstyle,
        molestyle, musstyle, firstName, lastName, birthdate
      );
ogmouthtex = mouthstyle;
      console.log(`Mii loaded (${label})`);
      return true;
    } catch (err) {
      console.error(`Failed to apply Mii (${label}):`, err);
      return false;
    }
  }

  // 2. Collect all Mii keys
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(prefix)) keys.push(k);
  }

  if (!keys.length) {
    console.warn(`No localStorage entries found starting with ${prefix}`);
    return;
  }

  keys.sort(); // predictable order

  // 3. Check if requested index exists
  if (miiIndex < 0 || miiIndex >= keys.length) {
    console.warn(`Invalid Mii index (${miiIndex}). Available range: 0 to ${keys.length - 1}`);
    return;
  }

  // 4. Load only the requested Mii
  const key = keys[miiIndex];
  try {
    const raw = localStorage.getItem(key);
    const data = JSON.parse(raw);
    apply(data, key);
  } catch (err) {
    console.error("Failed to parse localStorage Mii:", key, err);
  }
}
importMiiData();
</script>
