<script>
const context = new (window.AudioContext || window.webkitAudioContext)();
let bufferSource;
let gainNode;

fetch("sound/song/prpmansion.wav")
  .then(response => response.arrayBuffer())
  .then(arrayBuffer => context.decodeAudioData(arrayBuffer))
  .then(audioBuffer => {
    function startLoop() {
      bufferSource = context.createBufferSource();
      bufferSource.buffer = audioBuffer;
      bufferSource.loop = true;

      gainNode = context.createGain();
      gainNode.gain.value = 0.3;

      bufferSource.connect(gainNode);
      gainNode.connect(context.destination);

      bufferSource.start(0);

      document.removeEventListener('click', startLoop);
      document.removeEventListener('keydown', startLoop);
    }

    document.addEventListener('click', startLoop);
    document.addEventListener('keydown', startLoop);
  });

</script>
<script>
function showPopup(message, onConfirm) {
  const popup = document.getElementById("popup");
  const confirmBtn = document.getElementById("popup-confirm");
  const cancelBtn = document.getElementById("popup-cancel");

  popup.querySelector("p").textContent = message;

  // Remove old event listeners (so they don't stack up)
  confirmBtn.replaceWith(confirmBtn.cloneNode(true));
  cancelBtn.replaceWith(cancelBtn.cloneNode(true));

  // Get fresh references after clone
  const newConfirmBtn = document.getElementById("popup-confirm");
  const newCancelBtn = document.getElementById("popup-cancel");

  // Wire up new listeners
  newConfirmBtn.addEventListener("click", () => {
    if (onConfirm) onConfirm();
    closePopup();
  });

  newCancelBtn.addEventListener("click", () => {
    closePopup();
  });

  // Show the popup
  popup.classList.remove("hide");
  popup.style.display = "block";
  void popup.offsetWidth; // reflow
  popup.classList.add("show");
}



function closePopup() {
  const popup = document.getElementById("popup");
  popup.classList.remove("show");
  popup.classList.add("hide");

  popup.addEventListener("animationend", () => {
    if (popup.classList.contains("hide")) {
      popup.style.display = "none"; // fully hide after animation
    }
  }, { once: true });
}
</script>


<script>
const canvasmii = document.getElementById("uiCanvas");
const ctx = canvasmii.getContext("2d");

function drawTime() {
  ctx.clearRect(0, 0, canvasmii.width, canvasmii.height);
  ctx.font = "14px ArcadeClassic";
  ctx.fillStyle = "#A45364";
  ctx.textBaseline = "top";
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const date = now.getDate();
  const weekday = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"][now.getDay()];
  const dateStr = `${year}/   ${month}/${date}   ${weekday}`;
  const hours = now.getHours().toString().padStart(2, "0");
  const minutes = now.getMinutes().toString().padStart(2, "0");
  const seconds = now.getSeconds().toString().padStart(2, "0");
  const timeStr = `${hours} : ${minutes} : ${seconds}`;
  ctx.fillText(dateStr, 10, 10);
  const timeWidth = ctx.measureText(timeStr).width;
  ctx.imageSmoothingEnabled = false;
  ctx.fillText(timeStr, canvasmii.width - timeWidth - 10, 10);
}
setInterval(drawTime, 1000);
drawTime();
</script>

class NPC {
  constructor(model, speed = 2, idleClip, walkClip, walls = [], emoteClips = {}, emoteSounds = {}) {
    this.emoteSounds = emoteSounds;
    this.model = model;
    this.speed = speed;
    this.direction = new THREE.Vector3();
    this.setRandomDirection();

    this.mixer = new THREE.AnimationMixer(this.model);
    this.idleAction = this.mixer.clipAction(idleClip);
    this.walkAction = this.mixer.clipAction(walkClip);

    this.currentAction = null;
    this.isWalking = false;
    this.nextSwitchTime = Date.now() + this.getRandomInterval();

    this.audioListener = new THREE.AudioListener();
    this.walkSound = null;
    this.walkSoundLoaded = false;
    this.loadWalkingSound();

    this.walls = walls;

    this.emoteClips = emoteClips;
    this.isEmoting = false;
    this.emoteCooldown = 0;

    this.manualAnimation = null;
    this.manualAnimationDoneCallback = null;

    this.initBoundingBoxes();

    this.playAction(this.idleAction);
  }

  initBoundingBoxes() {
    this.npcBoundingBox = new THREE.Box3().setFromObject(this.model);
    this.wallBoundingBoxes = this.walls.map((wall) => {
      if (!wall.geometry.boundingBox) wall.geometry.computeBoundingBox();
      return new THREE.Box3().setFromObject(wall);
    });
  }

  loadWalkingSound() {
    const loader = new THREE.AudioLoader();
    loader.load(
      'sound/w.mp3',
      (buffer) => {
        this.walkSound = new THREE.PositionalAudio(this.audioListener);
        this.walkSound.setBuffer(buffer);
        this.walkSound.setVolume(0.5);
        this.model.add(this.walkSound);
        this.walkSoundLoaded = true;
      },
      undefined,
      (err) => {
        console.error('Failed to load walking sound:', err);
      }
    );
  }

  setRandomDirection() {
    const angle = Math.random() * 2 * Math.PI;
    this.direction.set(Math.sin(angle), 0, Math.cos(angle)).normalize();
  }

  setSafeRandomDirection(maxAttempts = 10) {
    for (let i = 0; i < maxAttempts; i++) {
      this.setRandomDirection();
      const testMove = this.direction.clone().multiplyScalar(this.speed * 0.1);
      const testBB = this.npcBoundingBox.clone().translate(testMove);

      let willCollide = false;
      for (const wallBB of this.wallBoundingBoxes) {
        if (testBB.intersectsBox(wallBB)) {
          willCollide = true;
          break;
        }
      }

      if (!willCollide) return;
    }
  }

  getRandomInterval() {
    return 2000 + Math.random() * 3000;
  }

  playAction(newAction) {
    if (this.currentAction !== newAction) {
      if (this.currentAction) this.currentAction.fadeOut(0.3);
      newAction.reset().setEffectiveTimeScale(1).setEffectiveWeight(1).fadeIn(0.3).play();
      this.currentAction = newAction;
    }
  }
playManualAnimation(action, onFinished) {
  if (this.manualAnimation !== action) {
if (this.currentAction) {
  this.currentAction.crossFadeTo(action, 0, false); // very quick crossfade (0.1 seconds)
} else {
  action.reset();
  action.time = 0.1;
  action.play();
}

    
    // Reset and play the new action from start, instantly
    action.reset().setEffectiveTimeScale(1).setEffectiveWeight(1).play();

    this.manualAnimation = action;
    this.currentAction = action;

    action.setLoop(THREE.LoopOnce);
    action.clampWhenFinished = true;

    this.manualAnimationDoneCallback = onFinished || null;
  }
}


  clearManualAnimation() {
    this.manualAnimation = null;
    this.manualAnimationDoneCallback = null;
  }

  update(delta) {
    if (this.manualAnimation) {
      this.mixer.update(delta);
      const time = this.manualAnimation.time;
      const duration = this.manualAnimation.getClip().duration;
      if (time >= duration) {
        if (this.manualAnimationDoneCallback) this.manualAnimationDoneCallback();
        this.clearManualAnimation();
      }
      return;
    }

    const now = Date.now();
    if (!this.nextSwitchTime) this.nextSwitchTime = now + this.getRandomInterval();

    if (now > this.nextSwitchTime) {
      this.isWalking = !this.isWalking;
      this.nextSwitchTime = now + this.getRandomInterval();

      if (this.isWalking) {
        this.setRandomDirection();
        this.playAction(this.walkAction);
        if (this.walkSoundLoaded && !this.walkSound.isPlaying) this.walkSound.play();
      } else {
        this.playAction(this.idleAction);
        if (this.walkSoundLoaded && this.walkSound.isPlaying) this.walkSound.stop();
      }
    }

// pick your standard box dimensions in world units
const STANDARD_WIDTH  = 1; // x
const STANDARD_HEIGHT = 2; // y
const STANDARD_DEPTH  = 1; // z

this.model.updateWorldMatrix(true, false);

// get the model's world-space bbox center so we know where to place the standard box
const tmpBox = new THREE.Box3().setFromObject(this.model);
const center = tmpBox.getCenter(new THREE.Vector3());

// if you want the box resting on the ground (y=0), ignore center.y
const halfW = STANDARD_WIDTH  * 0.5;
const halfD = STANDARD_DEPTH  * 0.5;

this.npcBoundingBox = new THREE.Box3();
this.npcBoundingBox.min.set(center.x - halfW, 0,        center.z - halfD);
this.npcBoundingBox.max.set(center.x + halfW, STANDARD_HEIGHT, center.z + halfD);


    this.walls.forEach((wall, i) => {
      wall.updateWorldMatrix(true, false);
      this.wallBoundingBoxes[i].setFromObject(wall);
    });

    if (!this.isWalking) {
      if (!this.isEmoting && now > this.emoteCooldown && Math.random() < 0.2) {
        const keys = Object.keys(this.emoteClips);
        if (keys.length > 0) {
          const randomKey = keys[Math.floor(Math.random() * keys.length)];
          const clip = this.emoteClips[randomKey];
          const emoteAction = this.mixer.clipAction(clip);

          this.isEmoting = true;
          this.playAction(emoteAction);

          emoteAction.setLoop(THREE.LoopOnce);
          emoteAction.clampWhenFinished = true;
          emoteAction.reset().play();

          if (this.emoteSounds[randomKey]) {
            const sound = this.emoteSounds[randomKey];
            if (!sound.isPlaying) sound.play();
          }

          this.mixer.addEventListener('finished', (e) => {
            if (this.isEmoting) {
              if (this.emoteSounds[randomKey]) {
                this.emoteSounds[randomKey].stop();
              }
              this.isEmoting = false;
              this.playAction(this.idleAction);
              this.emoteCooldown = Date.now() + 10000 + Math.random() * 10000;
            }
          });
        }
      }

      this.mixer.update(delta);
      return;
    }

    const moveVector = this.direction.clone().multiplyScalar(this.speed * 0.1);
    const newBB = this.npcBoundingBox.clone().translate(moveVector);
    let collision = false;
    for (const wallBB of this.wallBoundingBoxes) {
      if (newBB.intersectsBox(wallBB)) {
        collision = true;
        break;
      }
    }

    const targetPos = this.model.position.clone().add(this.direction);
    const currentQuat = this.model.quaternion.clone();
    this.model.lookAt(targetPos);
    const targetQuat = this.model.quaternion.clone();
    this.model.quaternion.copy(currentQuat);
    this.model.quaternion.slerp(targetQuat, delta * 5);
    const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(this.model.quaternion).normalize();
    const alignment = forward.dot(this.direction);
    const isFacingTarget = alignment > 0.95;

    if (isFacingTarget) {
      const moveVector = this.direction.clone().multiplyScalar(this.speed * 0.1);
      const newBB = this.npcBoundingBox.clone().translate(moveVector);

      let collision = false;
      for (const wallBB of this.wallBoundingBoxes) {
        if (newBB.intersectsBox(wallBB)) {
          collision = true;
          break;
        }
      }

      if (!collision) {
        this.model.position.add(moveVector);
        this.npcBoundingBox.copy(newBB);
      } else {
        this.setSafeRandomDirection();
        const newTargetPos = this.model.position.clone().add(this.direction);
        this.model.lookAt(newTargetPos);
        this.model.quaternion.copy(this.model.quaternion.clone());
      }
    }

    this.mixer.update(delta);
  }
}

function updateAllHeads() {
  const offsetEuler = new THREE.Euler(0, Math.PI, Math.PI / 2); // your rotation correction
  const offsetQuat = new THREE.Quaternion().setFromEuler(offsetEuler);

  miiHeads.forEach(mii => {
    const { headBone, headGroup } = mii;
    if (!headBone || !headGroup) return;

    const pos = new THREE.Vector3();
    const quat = new THREE.Quaternion();

    headBone.getWorldPosition(pos);
    headBone.getWorldQuaternion(quat);

    headGroup.position.copy(pos);

    // Apply rotation offset after bone rotation
    headGroup.quaternion.copy(quat).multiply(offsetQuat);

    headGroup.scale.set(0.7, 0.7, 0.7); // keep fixed scale
  });
}

async function equipMiiOutfit(miiData, outfitIndex, gender) {
  try {
    if (!miiData || !miiData.bodyMesh) return;

    const response = await fetch("texture/outfit/clothes_data.json");
    const clothesData = await response.json();
    const outfitConfig = clothesData[outfitIndex];
    if (!outfitConfig) return;

    async function loadImageTexture(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          const tex = new THREE.Texture(img);
          tex.needsUpdate = true;
          tex.minFilter = THREE.NearestFilter;
          tex.magFilter = THREE.NearestFilter;
          tex.flipY = false;
          resolve(tex);
        };
        img.onerror = () => reject(new Error("Image failed to load: " + url));
        img.src = url;
      });
    }

    const textures = {};
    for (const part of ["arms", "torso", "legs"]) {
      try {
        textures[part] = await loadImageTexture(
          `texture/outfit/${outfitIndex}_${part}.png`
        );
      } catch {
        console.warn(`No texture for ${part}`);
      }
    }

    miiData.bodyMesh.traverse(c => {
      if (!c.isMesh) return;
      const n = c.name.toLowerCase();
      if (n.includes("head")) return;

      let tex = null;
if (n.includes("arm")) tex = textures.arms;
else if (n.includes("body") || n.includes("torso")) tex = textures.torso;
else if (n.includes("leg")) tex = textures.legs;

      if (tex) {
        c.material = new THREE.MeshBasicMaterial({ map: tex });
        c.material.needsUpdate = true;
      }
    });


  } catch (e) {
    console.error("Failed to equip outfit:", e);
  }
}

function createMiiListItem(faceImageUrl, firstName, lastName, birthdate, onTellFortune, index, isExplorer = false) {

  function truncateByChars(str, maxChars) {
    const chars = Array.from(str);
    if (chars.length <= maxChars) return str;
    if (maxChars <= 1) return '…';
    return chars.slice(0, maxChars - 1).join('') + '…';
  }

  const fullName = (lastName + ' ' + firstName).toUpperCase();
  const displayName = truncateByChars(fullName, 15);

  async function loadImages(zipFile, files) {
    const imageMap = {};
    for (let fileName of files) {
      const blob = await zipFile.files[fileName].async("blob");
      const url = URL.createObjectURL(blob);
      imageMap[fileName] = url;
    }
    return imageMap;
  }

  function colorMatchWithTolerance(r, g, b, tr, tg, tb, tolerance = 150) {
    return (
      Math.abs(r - tr) <= tolerance &&
      Math.abs(g - tg) <= tolerance &&
      Math.abs(b - tb) <= tolerance
    );
  }

function hexToRgb(hex) {
  if (typeof hex === 'number') {
    hex = hex.toString(16).padStart(6, '0');
  } else if (typeof hex === 'string') {
    hex = hex.replace('#', '');
  } else {
    return { r: 0, g: 0, b: 0 };
  }
  if (hex.length !== 6) {
    return { r: 0, g: 0, b: 0 };
  }
  const num = parseInt(hex, 16);
  return {
    r: (num >> 16) & 255,
    g: (num >> 8) & 255,
    b: num & 255
  };
}


function recolorIris(imageData) {
  const data = imageData.data;
  const white = { r: 255, g: 255, b: 255 };
  const brown = { r: 0x4C, g: 0x40, b: 0x32 };
  const eyeColor = hexToRgb(eyeColorHex);

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    if (colorMatchWithTolerance(r, g, b, 0, 255, 0)) {
      data[i] = white.r;
      data[i + 1] = white.g;
      data[i + 2] = white.b;

    } else if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
      data[i] = brown.r;
      data[i + 1] = brown.g;
      data[i + 2] = brown.b;

    } else if (colorMatchWithTolerance(r, g, b, 0, 0, 255)) {
      data[i] = eyeColor.r;
      data[i + 1] = eyeColor.g;
      data[i + 2] = eyeColor.b;
    }
  }
}

function recolorBrow(imageData) {
  const data = imageData.data;
  const nrowColor = hexToRgb(browColorHex);

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
      data[i] = nrowColor.r;
      data[i + 1] = nrowColor.g;
      data[i + 2] = nrowColor.b;
  }
}
}

function recolorMouth(imageData) {
  const data = imageData.data;
  const baseColor = hexToRgb(lipcolor);
  const darkerColor = {
    r: Math.max(0, Math.floor(baseColor.r * 0.8)),
    g: Math.max(0, Math.floor(baseColor.g * 0.8)),
    b: Math.max(0, Math.floor(baseColor.b * 0.8))
  };
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];
    if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
      data[i] = baseColor.r;
      data[i + 1] = baseColor.g;
      data[i + 2] = baseColor.b;
    }
    else if (colorMatchWithTolerance(r, g, b, 0, 255, 0)) {
      data[i] = darkerColor.r;
      data[i + 1] = darkerColor.g;
      data[i + 2] = darkerColor.b;
    }
  }
}

const Leaveaudio = new Audio('sound/gamesfx/leave.wav');

function spawnDustEffect(position) {
  const particleCount = 50;
Leaveaudio.play();
  // Simple geometry with random offsets
  const geometry = new THREE.BufferGeometry();
  const positions = [];
  const velocities = [];

  for (let i = 0; i < particleCount; i++) {
    positions.push(position.x, position.y, position.z);
    velocities.push(
      (Math.random() - 0.5) * 0.1,  // vx
      Math.random() * 0.1 + 0.05,   // vy
      (Math.random() - 0.5) * 0.1   // vz
    );
  }

  geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
  geometry.setAttribute("velocity", new THREE.Float32BufferAttribute(velocities, 3));

  // White glowing points
  const material = new THREE.PointsMaterial({
    size: 0.2,
    color: 0xffffff,
  });

  const points = new THREE.Points(geometry, material);
  points.userData.lifetime = 1.0; // 1 second
  scene.add(points);

  // Hook into your render loop
  const clock = new THREE.Clock();

  function update() {
    const delta = clock.getDelta();
    points.userData.lifetime -= delta;

    const pos = geometry.getAttribute("position");
    const vel = geometry.getAttribute("velocity");

    for (let i = 0; i < pos.count; i++) {
      pos.array[i * 3 + 0] += vel.array[i * 3 + 0];
      pos.array[i * 3 + 1] += vel.array[i * 3 + 1];
      pos.array[i * 3 + 2] += vel.array[i * 3 + 2];
    }
    pos.needsUpdate = true;

    if (points.userData.lifetime > 0) {
      requestAnimationFrame(update);
    } else {
      scene.remove(points);
      geometry.dispose();
      material.dispose();
    }
  }
  update();
}


// Exporter plugin
function linearToSRGB(linear) {
  if (linear <= 0.0031308) {
    return linear * 12.92 * 255;
  } else {
    return (1.055 * Math.pow(linear, 1 / 2.4) - 0.055) * 255;
  }
}

function patchAllTextures(scene, colorFactor = 1) {
  scene.traverse(obj => {
    if (!obj.isMesh || !obj.material) return;

    const materials = Array.isArray(obj.material) ? obj.material : [obj.material];

    for (const mat of materials) {
      if (!mat.map && mat.color) {
        const size = 1;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const color = mat.color.clone().multiplyScalar(colorFactor);

        const r = Math.round(linearToSRGB(color.r));
        const g = Math.round(linearToSRGB(color.g));
        const b = Math.round(linearToSRGB(color.b));
        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.fillRect(0, 0, size, size);

        const tex = new THREE.CanvasTexture(canvas);
        tex.needsUpdate = true;

        mat.map = tex;
        mat.needsUpdate = true;
      }

      const materialsArray = Array.isArray(mat) ? mat : [mat];

      for (const m of materialsArray) {
        for (const key in m) {
          const tex = m[key];
          if (!(tex instanceof THREE.Texture)) continue;
          if (!tex.image || typeof tex.image !== 'object' || !tex.image.constructor) {
            const dummyCanvas = document.createElement('canvas');
            dummyCanvas.width = 1;
            dummyCanvas.height = 1;
            tex.image = dummyCanvas;
          }
          if (!tex.userData) tex.userData = {};
          if (!tex.userData.mimeType) tex.userData.mimeType = 'image/png';

          tex.needsUpdate = true;
        }
      }
    }
  });
}



    function exportGLB(scene) {

patchAllTextures(scene);
  const filename = `tomo_room.glb`;

const exporter = new THREE.GLTFExporter();

exporter.parse(
  scene,
  (result) => {
    const blob = new Blob([result], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
  },
  (err) => {
    console.error('Export failed:', err);
  },
  {
    binary: true,
    embedImages: true,
    onlyVisible: true
  }
);
    }
