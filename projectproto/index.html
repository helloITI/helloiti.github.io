<script>
const canvasmii = document.getElementById("uiCanvas");
const ctx = canvasmii.getContext("2d");

function drawTime() {
  ctx.clearRect(0, 0, canvasmii.width, canvasmii.height);

  // Date/time
  ctx.font = "14px ArcadeClassic";
  ctx.fillStyle = "#A45364";
  ctx.textBaseline = "top";
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const date = now.getDate();
  const weekday = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"][now.getDay()];
  const dateStr = `${year}/   ${month}/${date}   ${weekday}`;
  const hours = now.getHours().toString().padStart(2, "0");
  const minutes = now.getMinutes().toString().padStart(2, "0");
  const seconds = now.getSeconds().toString().padStart(2, "0");
  const timeStr = `${hours} : ${minutes} : ${seconds}`;
  ctx.fillText(dateStr, 10, 10);
  const timeWidth = ctx.measureText(timeStr).width;
  ctx.fillText(timeStr, canvasmii.width - timeWidth - 10, 10);

  let hasMii = false;
  for (let i = 0; i < localStorage.length; i++) {
    if (localStorage.key(i).startsWith("PRPMII_")) {
      hasMii = true;
      break;
    }
  }

  const bottomMessage = hasMii
    ? "WELCOME BACK"
    : "MAKE A MII TO GET STARTED";

  ctx.textBaseline = "bottom";
  const messageWidth = ctx.measureText(bottomMessage).width;
  const messageX = (canvasmii.width - messageWidth) / 2;
  const messageY = canvasmii.height - 10;
  ctx.fillText(bottomMessage, messageX, messageY);
}

setInterval(drawTime, 1000);
drawTime();

</script>

<script>
  const context = new (window.AudioContext || window.webkitAudioContext)();
  let bufferSource;
  let gainNode = context.createGain();
  gainNode.gain.value = 0.2;

  fetch("sound/song/SEQ_MENU.mp3")
    .then(response => response.arrayBuffer())
    .then(arrayBuffer => context.decodeAudioData(arrayBuffer))
    .then(audioBuffer => {
      function startLoop() {
        bufferSource = context.createBufferSource();
        bufferSource.buffer = audioBuffer;
        bufferSource.loop = true;

        bufferSource.connect(gainNode);
        gainNode.connect(context.destination);

        bufferSource.start(0);
        document.removeEventListener('click', startLoop);
        document.removeEventListener('keydown', startLoop);
      }

      document.addEventListener('click', startLoop);
      document.addEventListener('keydown', startLoop);
    });

</script>

  const box = new THREE.Box3().setFromObject(mesh);
  const size = new THREE.Vector3();
  const center = new THREE.Vector3();
  box.getSize(size);
  box.getCenter(center);
  return { size, center };
