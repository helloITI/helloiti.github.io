  async function loadGLBFromZip(path) {
    const file = zip.file(path);
    if (file) {
    const buffer = await file.async('arraybuffer');
    return new Promise((resolve, reject) => {
      loader.parse(buffer, '', gltf => resolve(gltf.scene), reject);
    });
    }
  }

function updateBodyScale(he,we) {
  const height = parseFloat(he);
  const weight = parseFloat(we);

  if (bodyMesh) {
    const baseScale = 0.1;
    const scaleX = -baseScale * weight * height;
    const scaleY = baseScale * height;
    const scaleZ = baseScale * weight * height;
    bodyMesh.scale.set(scaleX, scaleY, scaleZ);

    let cameraY = height + 0.5;

    const minY = 1;
    const maxY = 5;
    camera.position.y = Math.max(minY, Math.min(maxY, cameraY));
  }
}

async function SetGlasses(glasses) {
  const glassesKey = `proto_facelib/txt/glasses/${glasses + '.png'}`;
  const imageSrc = zipImages.glasses[glassesKey];

  const image = new Image();
  image.crossOrigin = "anonymous";
  image.src = imageSrc;

  image.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = image.width;
    canvas.height = image.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(image, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const glacol = hexToRgb(glassesColorHex);
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];
      if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
        data[i] = glacol.r;
        data[i + 1] = glacol.g;
        data[i + 2] = glacol.b;
      }
    }
    ctx.putImageData(imageData, 0, 0);
    const texture = new THREE.Texture(canvas);
    texture.flipY = false;
    texture.minFilter = THREE.NearestFilter;
    texture.magFilter = THREE.NearestFilter;
    texture.needsUpdate = true;

    const newMaterial = new THREE.MeshBasicMaterial({
      map: texture,
      transparent: true,
    });
    glassMesh.position.y = 0.6+(-LIB_Glass_PosY/50);
    glassMesh.position.z = -0.5
    const baseScale = 1.0 + (LIB_Glass_Scale / 30);
    glassMesh.scale.set(baseScale, baseScale, baseScale); 

    glassMesh.traverse((child) => {
      if (child.isMesh) {
        child.material = newMaterial;
        child.material.needsUpdate = true;
      }
    });
  };
}

function recolorStache(imageData, hairColorRGB) {
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];
    const a = data[i + 3];
    if (r > 200 && g < 80 && b < 80 && a > 0) {
      data[i] = hairColorRGB.r;
      data[i + 1] = hairColorRGB.g;
      data[i + 2] = hairColorRGB.b;
    }
  }
}

  function colorMatchWithTolerance(r, g, b, tr, tg, tb, tolerance = 150) {
    return (
      Math.abs(r - tr) <= tolerance &&
      Math.abs(g - tg) <= tolerance &&
      Math.abs(b - tb) <= tolerance
    );
  }

function hexToRgb(hex) {
  if (typeof hex === 'number') {
    hex = hex.toString(16).padStart(6, '0');
  } else if (typeof hex === 'string') {
    hex = hex.replace('#', '');
  } else {
    return { r: 0, g: 0, b: 0 };
  }
  if (hex.length !== 6) {
    return { r: 0, g: 0, b: 0 };
  }
  const num = parseInt(hex, 16);
  return {
    r: (num >> 16) & 255,
    g: (num >> 8) & 255,
    b: num & 255
  };
}


function recolorIris(imageData) {
  const data = imageData.data;
  const white = { r: 255, g: 255, b: 255 };
  const brown = { r: 0x4C, g: 0x40, b: 0x32 };
  const eyeColor = hexToRgb(eyeColorHex);

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    if (colorMatchWithTolerance(r, g, b, 0, 255, 0)) {
      data[i] = white.r;
      data[i + 1] = white.g;
      data[i + 2] = white.b;

    } else if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
      data[i] = brown.r;
      data[i + 1] = brown.g;
      data[i + 2] = brown.b;

    } else if (colorMatchWithTolerance(r, g, b, 0, 0, 255)) {
      data[i] = eyeColor.r;
      data[i + 1] = eyeColor.g;
      data[i + 2] = eyeColor.b;
    }
  }
}

function recolorBrow(imageData) {
  const data = imageData.data;
  const nrowColor = hexToRgb(browColorHex);

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
      data[i] = nrowColor.r;
      data[i + 1] = nrowColor.g;
      data[i + 2] = nrowColor.b;
  }
}
}

function recolorMouth(imageData) {
  const data = imageData.data;
  const baseColor = hexToRgb(lipcolor);
  const darkerColor = {
    r: Math.max(0, Math.floor(baseColor.r * 0.8)),
    g: Math.max(0, Math.floor(baseColor.g * 0.8)),
    b: Math.max(0, Math.floor(baseColor.b * 0.8))
  };
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];
    if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
      data[i] = baseColor.r;
      data[i + 1] = baseColor.g;
      data[i + 2] = baseColor.b;
    }
    else if (colorMatchWithTolerance(r, g, b, 0, 255, 0)) {
      data[i] = darkerColor.r;
      data[i + 1] = darkerColor.g;
      data[i + 2] = darkerColor.b;
    }
  }
}

// Exporter plugin
function linearToSRGB(linear) {
  if (linear <= 0.0031308) {
    return linear * 12.92 * 255;
  } else {
    return (1.055 * Math.pow(linear, 1 / 2.4) - 0.055) * 255;
  }
}

function patchAllTextures(scene, colorFactor = 1) {
  scene.traverse(obj => {
    if (!obj.isMesh || !obj.material) return;

    const materials = Array.isArray(obj.material) ? obj.material : [obj.material];

    for (const mat of materials) {
      if (!mat.map && mat.color) {
        const size = 1;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const color = mat.color.clone().multiplyScalar(colorFactor);

        const r = Math.round(linearToSRGB(color.r));
        const g = Math.round(linearToSRGB(color.g));
        const b = Math.round(linearToSRGB(color.b));
        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.fillRect(0, 0, size, size);

        const tex = new THREE.CanvasTexture(canvas);
        tex.needsUpdate = true;

        mat.map = tex;
        mat.needsUpdate = true;
      }

      const materialsArray = Array.isArray(mat) ? mat : [mat];

      for (const m of materialsArray) {
        for (const key in m) {
          const tex = m[key];
          if (!(tex instanceof THREE.Texture)) continue;
          if (!tex.image || typeof tex.image !== 'object' || !tex.image.constructor) {
            const dummyCanvas = document.createElement('canvas');
            dummyCanvas.width = 1;
            dummyCanvas.height = 1;
            tex.image = dummyCanvas;
          }
          if (!tex.userData) tex.userData = {};
          if (!tex.userData.mimeType) tex.userData.mimeType = 'image/png';

          tex.needsUpdate = true;
        }
      }
    }
  });
}



    function exportGLB(scene) {

patchAllTextures(scene);
  const filename = `tomo_room.glb`;

const exporter = new THREE.GLTFExporter();

exporter.parse(
  scene,
  (result) => {
    const blob = new Blob([result], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
  },
  (err) => {
    console.error('Export failed:', err);
  },
  {
    binary: true,
    embedImages: true,
    onlyVisible: true
  }
);
    }
