<script>
const canvasmii = document.getElementById("uiCanvas");
const ctx = canvasmii.getContext("2d");

function drawTime() {
  ctx.clearRect(0, 0, canvasmii.width, canvasmii.height);
  ctx.font = "14px ArcadeClassic";
  ctx.fillStyle = "#A45364";
  ctx.textBaseline = "top";
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const date = now.getDate();
  const weekday = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"][now.getDay()];
  const dateStr = `${year}/   ${month}/${date}   ${weekday}`;
  const hours = now.getHours().toString().padStart(2, "0");
  const minutes = now.getMinutes().toString().padStart(2, "0");
  const seconds = now.getSeconds().toString().padStart(2, "0");
  const timeStr = `${hours} : ${minutes} : ${seconds}`;
  ctx.fillText(dateStr, 10, 10);
  const timeWidth = ctx.measureText(timeStr).width;
  ctx.fillText(timeStr, canvasmii.width - timeWidth - 10, 10);
}
setInterval(drawTime, 1000);
drawTime();
</script>

<script>
  const context = new (window.AudioContext || window.webkitAudioContext)();
  let bufferSource;
  let gainNode = context.createGain();
  gainNode.gain.value = 0.2;

  fetch("sound/song/clothingstore1.wav")
    .then(response => response.arrayBuffer())
    .then(arrayBuffer => context.decodeAudioData(arrayBuffer))
    .then(audioBuffer => {
      function startLoop() {
        bufferSource = context.createBufferSource();
        bufferSource.buffer = audioBuffer;
        bufferSource.loop = true;

        bufferSource.connect(gainNode);
        gainNode.connect(context.destination);

        bufferSource.start(0);
        document.removeEventListener('click', startLoop);
        document.removeEventListener('keydown', startLoop);
      }

      document.addEventListener('click', startLoop);
      document.addEventListener('keydown', startLoop);
    });

</script>

  async function loadGLBFromZip(path) {
    const file = zip.file(path);
    if (file) {
    const buffer = await file.async('arraybuffer');
    return new Promise((resolve, reject) => {
      loader.parse(buffer, '', gltf => resolve(gltf.scene), reject);
    });
    }
  }

  async function loadBodyAndAnimations(url) {
    return new Promise((resolve, reject) => {

function renderFace(expression = -1) {
  const isDefault = expression === -1;
  const preset = isDefault ? {} : (expressionPresets[expression] || {});

  const EX_eyestyle = preset.EX_eyestyle || eyestyle;
  const EX_mouthstyle = preset.EX_mouthstyle || mouthstyle;
  const EX_LIB_Brow_PosY = preset.EX_LIB_Brow_PosY || 0;
  const EX_LIB_Brow_Rot = preset.EX_LIB_Brow_Rot || 0;
  const EX_LIB_Eye_PosX = preset.EX_LIB_Eye_PosX || 0;
  const EX_LIB_Eye_PosY = preset.EX_LIB_Eye_PosY || 0;
  const EX_LIB_Eye_Rot = preset.EX_LIB_Eye_Rot || 0;
  const EX_LIB_Mouth_PosY = preset.EX_LIB_Mouth_PosY || 0;

  faceComposeCtx.setTransform(1, 0, 0, 1, 0, 0);
  faceComposeCtx.clearRect(0, 0, faceComposeCanvas.width, faceComposeCanvas.height);
  faceComposeCtx.save();
  faceComposeCtx.translate(-2.5, 0);

  const eyebrowImg = new Image();
  const eyeImg = new Image();
  const mouthImg = new Image();
  const noseImg = new Image();
  const detImg = new Image();
  const sknImg = new Image();
  const molImg = new Image();
  const musImg = new Image();

  const eyebrowKey = `proto_facelib/txt/eyebrow/${eyebrowstyle}`;
  const eyeKey = `proto_facelib/txt/eye/${EX_eyestyle}`;
  const mouthKey = `proto_facelib/txt/mouth/${EX_mouthstyle}`;
  const noseKey = `proto_facelib/txt/nose/${nosestyle}`;
  const detailKey = `proto_facelib/txt/detail/${detailstyle}`;
  const skinKey = `proto_facelib/txt/head/${skintone + '.png'}`;
  const moleKey = `proto_facelib/txt/mole/${molestyle}`;
  const stamusKey = `proto_facelib/txt/mus/${musstyle}`;

  eyebrowImg.src = zipImages.eyebrow[eyebrowKey];
  eyeImg.src = zipImages.eye[eyeKey];
  mouthImg.src = zipImages.mouth[mouthKey];
  noseImg.src = zipImages.nose[noseKey];
  detImg.src = zipImages.detail[detailKey];
  sknImg.src = zipImages.skin[skinKey];
  molImg.src = zipImages.mole[moleKey];
  musImg.src = zipImages.stache[stamusKey];

  let loaded = 0;

  function checkDraw() {
    loaded++;
    if (loaded < 8) return;

    // Draw eyes
    const eyeCanvas = document.createElement('canvas');
    eyeCanvas.width = eyeImg.width;
    eyeCanvas.height = eyeImg.height;
    const eyeCtx = eyeCanvas.getContext('2d');
    eyeCtx.drawImage(eyeImg, 0, 0);
    const eyeImageData = eyeCtx.getImageData(0, 0, eyeCanvas.width, eyeCanvas.height);
    if (EX_eyestyle !== '51.png') recolorIris(eyeImageData);
    eyeCtx.putImageData(eyeImageData, 0, 0);

    faceComposeCtx.save();
    faceComposeCtx.translate(140 + LIB_Eye_PosX + EX_LIB_Eye_PosX + eyeCanvas.width / 2, 60 + LIB_Eye_PosY + EX_LIB_Eye_PosY + eyeCanvas.height / 2);
    faceComposeCtx.scale(1 + (LIB_Eye_Scale / 30), 1 + (LIB_Eye_Scale / 30));
    faceComposeCtx.rotate(LIB_Eye_Rot / 30);
    faceComposeCtx.drawImage(eyeCanvas, -eyeCanvas.width / 2, -eyeCanvas.height / 2);
    faceComposeCtx.restore();

    faceComposeCtx.save();
    faceComposeCtx.translate(10 - LIB_Eye_PosX + EX_LIB_Eye_PosX + eyeCanvas.width / 2, 60 + LIB_Eye_PosY + EX_LIB_Eye_PosY + eyeCanvas.height / 2);
    faceComposeCtx.scale(-1 - (LIB_Eye_Scale / 30), 1 + (LIB_Eye_Scale / 30));
    faceComposeCtx.rotate((LIB_Eye_Rot + EX_LIB_Eye_Rot) / 30);
    faceComposeCtx.drawImage(eyeCanvas, -eyeCanvas.width / 2, -eyeCanvas.height / 2);
    faceComposeCtx.restore();

    // Draw mustache
    const stacheCanvas = document.createElement('canvas');
    stacheCanvas.width = musImg.width;
    stacheCanvas.height = musImg.height;
    const stacheCtx = stacheCanvas.getContext('2d');
    stacheCtx.drawImage(musImg, 0, 0);
    const hairColorRGB = hexToRgb(haircolor);
    const stacheImageData = stacheCtx.getImageData(0, 0, stacheCanvas.width, stacheCanvas.height);
    recolorStache(stacheImageData, hairColorRGB);
    stacheCtx.putImageData(stacheImageData, 0, 0);
    faceComposeCtx.drawImage(stacheCanvas, 95, 145 + LIB_Stache_PosY, stacheCanvas.width, stacheCanvas.height);

    // Draw nose
    const noseScale = 0.8 + (LIB_Nose_Scale / 50);
    const noseCanvas = document.createElement('canvas');
    noseCanvas.width = noseImg.width;
    noseCanvas.height = noseImg.height;
    const noseCtx = noseCanvas.getContext('2d');
    noseCtx.imageSmoothingEnabled = false;
    noseCtx.drawImage(noseImg, 0, 0);

    faceComposeCtx.save();
    faceComposeCtx.translate(45 + noseCanvas.width / 2, 60 + LIB_Nose_PosY + noseCanvas.height / 2);
    faceComposeCtx.scale(noseScale, noseScale);
    faceComposeCtx.drawImage(noseCanvas, -noseCanvas.width / 2, -noseCanvas.height / 2);
    faceComposeCtx.restore();

    // Draw mouth
    const mouthScale = 1.5 + (LIB_Mouth_Scale / 30);
    const mouthCanvas = document.createElement('canvas');
    mouthCanvas.width = mouthImg.width;
    mouthCanvas.height = mouthImg.height;
    const mouthCtx = mouthCanvas.getContext('2d');
    mouthCtx.drawImage(mouthImg, 0, 0);
    const mouthImageData = mouthCtx.getImageData(0, 0, mouthCanvas.width, mouthCanvas.height);
    recolorMouth(mouthImageData);
    mouthCtx.putImageData(mouthImageData, 0, 0);
    mouthCtx.imageSmoothingEnabled = false;

    faceComposeCtx.save();
    faceComposeCtx.translate(104 + mouthCanvas.width / 2, 170 + LIB_Mouth_PosY + EX_LIB_Mouth_PosY + mouthCanvas.height / 2);
    faceComposeCtx.scale(mouthScale, mouthScale);
    faceComposeCtx.drawImage(mouthCanvas, -mouthCanvas.width / 2, -mouthCanvas.height / 2);
    faceComposeCtx.restore();

    // Draw eyebrows
    const browCanvas = document.createElement('canvas');
    browCanvas.width = eyebrowImg.width;
    browCanvas.height = eyebrowImg.height;
    const browCtx = browCanvas.getContext('2d');
    browCtx.drawImage(eyebrowImg, 0, 0);
    const browImageData = browCtx.getImageData(0, 0, browCanvas.width, browCanvas.height);
    recolorBrow(browImageData);
    browCtx.putImageData(browImageData, 0, 0);

    const browRotation = (LIB_Brow_Rot + EX_LIB_Brow_Rot) / 30;

    faceComposeCtx.save();
    faceComposeCtx.translate(140 + LIB_Brow_PosX + EX_LIB_Brow_PosX + browCanvas.width / 2, 40 + LIB_Brow_PosY + EX_LIB_Brow_PosY + browCanvas.height / 2);
    faceComposeCtx.scale(1 + (LIB_Brow_Scale / 30), 1 + (LIB_Brow_Scale / 30));
    faceComposeCtx.rotate(browRotation);
    faceComposeCtx.drawImage(browCanvas, -browCanvas.width / 2, -browCanvas.height / 2);
    faceComposeCtx.restore();

    faceComposeCtx.save();
    faceComposeCtx.translate(30 - LIB_Brow_PosX + EX_LIB_Brow_PosX + browCanvas.width / 2, 40 + LIB_Brow_PosY + EX_LIB_Brow_PosY + browCanvas.height / 2);
    faceComposeCtx.scale(-1 - (LIB_Brow_Scale / 30), 1 + (LIB_Brow_Scale / 30));
    faceComposeCtx.rotate(browRotation);
    faceComposeCtx.drawImage(browCanvas, -browCanvas.width / 2, -browCanvas.height / 2);
    faceComposeCtx.restore();

    // Draw mole
    faceComposeCtx.drawImage(molImg, 60 + LIB_Mole_PosX, 175 + LIB_Mole_PosY, molImg.width / 2.5 + (LIB_Mole_Scale / 30), molImg.height / 2.5 + (LIB_Mole_Scale / 30));

    // Update textures if needed
    if (faceTexture) {

  function colorMatchWithTolerance(r, g, b, tr, tg, tb, tolerance = 150) {
    return (
      Math.abs(r - tr) <= tolerance &&
      Math.abs(g - tg) <= tolerance &&
      Math.abs(b - tb) <= tolerance
    );

function hexToRgb(hex) {
  if (typeof hex === 'number') {
    hex = hex.toString(16).padStart(6, '0');
  } else if (typeof hex === 'string') {
    hex = hex.replace('#', '');
  } else {
    return { r: 0, g: 0, b: 0 };
  }
  if (hex.length !== 6) {
    return { r: 0, g: 0, b: 0 };
  }
  const num = parseInt(hex, 16);
  return {
    r: (num >> 16) & 255,
    g: (num >> 8) & 255,
    b: num & 255
  };
}


function recolorIris(imageData) {
  const data = imageData.data;
  const white = { r: 255, g: 255, b: 255 };
  const brown = { r: 0x4C, g: 0x40, b: 0x32 };
  const eyeColor = hexToRgb(eyeColorHex);

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    if (colorMatchWithTolerance(r, g, b, 0, 255, 0)) {
      data[i] = white.r;
      data[i + 1] = white.g;
      data[i + 2] = white.b;

    } else if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
      data[i] = brown.r;
      data[i + 1] = brown.g;
      data[i + 2] = brown.b;

    } else if (colorMatchWithTolerance(r, g, b, 0, 0, 255)) {
      data[i] = eyeColor.r;
      data[i + 1] = eyeColor.g;
      data[i + 2] = eyeColor.b;
    }
  }
}
