<script>
function calculatePersonality() {
  const v1 = parseInt(document.getElementById("Perso1").value);

  const v3 = parseInt(document.getElementById("Perso3").value);
  const v4 = parseInt(document.getElementById("Perso4").value);

  const personalities = [
    {name: "Drama Magnet", score: v4 + v3 - v2}, 
    {name: "Eccentric Dreamer", score: v1 + (8 - v2)}, 
    {name: "Mischievous Trickster", score: v3 + v4}, 
    {name: "Bookworm", score: v2 + (8 - v3)}, 
    {name: "Optimist", score: v3 + (8 - v2)}, 
    {name: "Thinker", score: v2 + (8 - v4)}, 
    {name: "Go-Getter", score: v2 + v3}, 
    {name: "Slacker", score: (8 - v3) + (8 - v2)}, 
    {name: "Caregiver", score: v4 + (8 - v1)}, 
    {name: "Workaholic", score: v2 + v1}, 
    {name: "Free Spirit", score: v1 + (8 - v4)} 
  ];

  personalities.sort((a, b) => b.score - a.score);
  const result = personalities[0].name;

  const descriptions = {
    "Drama Magnet": "He/She loves gossip, and thrives on excitement. Relationships are unstable.",

}

  .then(arrayBuffer => context.decodeAudioData(arrayBuffer))
  .then(audioBuffer => {

    function startLoop() {
      bufferSource = context.createBufferSource();
      bufferSource.buffer = audioBuffer;
      bufferSource.loop = true;
      const gainNode = context.createGain();
      gainNode.gain.value = 0.6;
      bufferSource.connect(gainNode);
      gainNode.connect(context.destination);

      bufferSource.start(0);
      document.removeEventListener('click', startLoop);
      document.removeEventListener('keydown', startLoop);
    }

    document.addEventListener('click', startLoop);
    document.addEventListener('keydown', startLoop);
  });
</script>

<script>
  const soundLower = new Audio("sound/tap.wav");
  const soundUpper = new Audio("sound/tap.wav");
  const sliderStates = new WeakMap();
  function playSound(direction) {
    if (direction === 'up') {
      soundUpper.currentTime = 0;
      soundUpper.play();
    } else {
      soundLower.currentTime = 0;
      soundLower.play();
    }
  }
  function setupSlider(slider) {
    sliderStates.set(slider, { value: slider.value, lastPlayed: 0 });

    slider.addEventListener('input', () => {
      const state = sliderStates.get(slider);
      const newValue = slider.value;
      const now = Date.now();

      if (Math.abs(newValue - state.value) > 0) {
        const direction = newValue > state.value ? 'up' : 'down';
        if (now - state.lastPlayed > 50) {
          playSound(direction);
          state.lastPlayed = now;
        }
        state.value = newValue;
        sliderStates.set(slider, state);
      }
    });
  }
  window.addEventListener('DOMContentLoaded', () => {
    const sliders = document.querySelectorAll('input[type="range"]');
    sliders.forEach(setupSlider);
  });
</script>

async function SetGlasses(glasses) {
  const glassesKey = `proto_facelib/txt/glasses/${glasses + '.png'}`;
  const imageSrc = zipImages.glasses[glassesKey];

  const image = new Image();
  image.crossOrigin = "anonymous";
  image.src = imageSrc;

  image.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = image.width;
    canvas.height = image.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(image, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const glacol = hexToRgb(glassesColorHex);
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];
      if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
        data[i] = glacol.r;
        data[i + 1] = glacol.g;
        data[i + 2] = glacol.b;
      }
    }
    ctx.putImageData(imageData, 0, 0);
    const texture = new THREE.Texture(canvas);
    texture.flipY = false;
    texture.minFilter = THREE.NearestFilter;
    texture.magFilter = THREE.NearestFilter;
    texture.needsUpdate = true;

    const newMaterial = new THREE.MeshBasicMaterial({
      map: texture,
      transparent: true,
    });
    glassMesh.position.y = 0.6+(-LIB_Glass_PosY/50);
    glassMesh.position.z = -0.5
    const baseScale = 1.0 + (LIB_Glass_Scale / 30);
    glassMesh.scale.set(baseScale, baseScale, baseScale); 

    glassMesh.traverse((child) => {
      if (child.isMesh) {
        child.material = newMaterial;
        child.material.needsUpdate = true;
      }
    });
  };
}

    ));
    headGroup.quaternion.multiply(correction);

        isRotating = false;
      }
    }
  }

function recolorImage(src, callback) {
  const img = new Image();
  img.crossOrigin = "Anonymous";
  img.onload = function () {
    const canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;

    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    recolorIris(imageData);
    ctx.putImageData(imageData, 0, 0);

    const newImg = new Image();
    newImg.src = canvas.toDataURL();
    newImg.setAttribute("data-src", src);
    callback(newImg);
  };
  img.src = src;
}

async function recolorBrowButtons(browColorHex = "#4A2C2A") {
  const container = document.getElementById("eyebrowContainer");
  if (!container) return;

  const eyebrowImages = container.querySelectorAll("button > img:first-child");

  // Parse browColorHex to RGB
  const rNew = parseInt(browColorHex.slice(1, 3), 16);
  const gNew = parseInt(browColorHex.slice(3, 5), 16);
  const bNew = parseInt(browColorHex.slice(5, 7), 16);

  for (const img of eyebrowImages) {
    try {
      // Step 1: Fetch the blob from the current src
      const response = await fetch(img.src);
      const blob = await response.blob();
      const url = URL.createObjectURL(blob);

      // Step 2: Load the image normally
      const sourceImg = await new Promise((resolve, reject) => {
        const tempImg = new Image();
        tempImg.src = url;
        tempImg.onload = () => resolve(tempImg);
        tempImg.onerror = reject;
      });

      // Step 3: Create canvas
      const canvas = document.createElement("canvas");
      canvas.width = sourceImg.width;
      canvas.height = sourceImg.height;
      const ctx = canvas.getContext("2d");

      // Step 4: Fill canvas entirely with brow color
      ctx.fillStyle = browColorHex;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Step 5: Draw original image as alpha mask
      ctx.globalCompositeOperation = "destination-in";
      ctx.drawImage(sourceImg, 0, 0);
      ctx.globalCompositeOperation = "source-over"; // reset

      // Step 6: Create new image and replace
      const newImg = new Image();
      newImg.src = canvas.toDataURL();
      newImg.style.width = img.style.width;
      newImg.style.height = img.style.height;
      newImg.style.objectFit = img.style.objectFit;
      newImg.style.position = img.style.position;
      newImg.style.top = img.style.top;
      newImg.style.left = img.style.left;
      newImg.style.zIndex = img.style.zIndex;

      img.parentNode.replaceChild(newImg, img);

      // Step 7: Release the temporary object URL
      URL.revokeObjectURL(url);

    } catch (err) {
      console.error("Error recoloring eyebrow image:", img.src, err);
    }
  }
}

  async function loadImages(zipFile, files) {
    const imageMap = {};
    for (let fileName of files) {
      const blob = await zipFile.files[fileName].async("blob");
      const url = URL.createObjectURL(blob);
      imageMap[fileName] = url;
    }
    return imageMap;
  }

  function colorMatchWithTolerance(r, g, b, tr, tg, tb, tolerance = 150) {
    return (
      Math.abs(r - tr) <= tolerance &&
      Math.abs(g - tg) <= tolerance &&
      Math.abs(b - tb) <= tolerance
    );
  }

function hexToRgb(hex) {
  if (typeof hex === 'number') {
    hex = hex.toString(16).padStart(6, '0');
  } else if (typeof hex === 'string') {
    hex = hex.replace('#', '');
  } else {
    return { r: 0, g: 0, b: 0 };
  }
  if (hex.length !== 6) {
    return { r: 0, g: 0, b: 0 };
  }
  const num = parseInt(hex, 16);
  return {
    r: (num >> 16) & 255,
    g: (num >> 8) & 255,
    b: num & 255
  };
}


function recolorIris(imageData) {
  const data = imageData.data;
  const white = { r: 255, g: 255, b: 255 };
  const brown = { r: 0x4C, g: 0x40, b: 0x32 };
  const eyeColor = hexToRgb(eyeColorHex);

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    if (colorMatchWithTolerance(r, g, b, 0, 255, 0)) {
      data[i] = white.r;
      data[i + 1] = white.g;
      data[i + 2] = white.b;

    } else if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
      data[i] = brown.r;
      data[i + 1] = brown.g;
      data[i + 2] = brown.b;

    } else if (colorMatchWithTolerance(r, g, b, 0, 0, 255)) {
      data[i] = eyeColor.r;
      data[i + 1] = eyeColor.g;
      data[i + 2] = eyeColor.b;
    }
  }
}

function recolorBrow(imageData) {
  const data = imageData.data;
  const nrowColor = hexToRgb(browColorHex);

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
      data[i] = nrowColor.r;
      data[i + 1] = nrowColor.g;
      data[i + 2] = nrowColor.b;
  }
}
}

  const darkerColor = {
    r: Math.max(0, Math.floor(baseColor.r * 0.8)),
    g: Math.max(0, Math.floor(baseColor.g * 0.8)),
    b: Math.max(0, Math.floor(baseColor.b * 0.8))
  };
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];
    if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
      data[i] = baseColor.r;
      data[i + 1] = baseColor.g;
      data[i + 2] = baseColor.b;
    }
    else if (colorMatchWithTolerance(r, g, b, 0, 255, 0)) {
      data[i] = darkerColor.r;
      data[i + 1] = darkerColor.g;
      data[i + 2] = darkerColor.b;
    }
  }
}
