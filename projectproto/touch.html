function drawTime() {
  ctx.clearRect(0, 0, canvasmii.width, canvasmii.height);
  ctx.font = "14px ArcadeClassic";
  ctx.fillStyle = "#A45364";
  ctx.textBaseline = "top";
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const date = now.getDate();
  const weekday = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"][now.getDay()];
  const dateStr = `${year}/   ${month}/${date}   ${weekday}`;
  const hours = now.getHours().toString().padStart(2, "0");
  const minutes = now.getMinutes().toString().padStart(2, "0");
  const seconds = now.getSeconds().toString().padStart(2, "0");
  const timeStr = `${hours} : ${minutes} : ${seconds}`;
  ctx.fillText(dateStr, 10, 10);
  const timeWidth = ctx.measureText(timeStr).width;
  ctx.fillText(timeStr, canvasmii.width - timeWidth - 10, 10);
}
setInterval(drawTime, 1000);
drawTime();


</script>

<script>
const context = new (window.AudioContext || window.webkitAudioContext)();
let bufferSource;
let gainNode;

fetch("sound/song/home.wav")
  .then(response => response.arrayBuffer())
  .then(arrayBuffer => context.decodeAudioData(arrayBuffer))
  .then(audioBuffer => {
    function startLoop() {
      bufferSource = context.createBufferSource();
      bufferSource.buffer = audioBuffer;
      bufferSource.loop = true;

      gainNode = context.createGain();
      gainNode.gain.value = 0.3;

      bufferSource.connect(gainNode);
      gainNode.connect(context.destination);

      bufferSource.start(0);

      document.removeEventListener('click', startLoop);
      document.removeEventListener('keydown', startLoop);
    }

    document.addEventListener('click', startLoop);
    document.addEventListener('keydown', startLoop);
  });

</script>

function addThinkingBubble(headBone) {
  // Randomly pick bubble type

SpeechType = type;

    : "graphics/game/problem_bubble.png";

  const texture = loader.load(textureUrl);

  // Create a plane for the bubble
  const bubbleMaterial = new THREE.MeshBasicMaterial({
    map: texture,
    transparent: true,
    depthWrite: false,
  });

  const bubbleGeometry = new THREE.PlaneGeometry(0.5, 0.5); // size of bubble
  const bubbleMesh = new THREE.Mesh(bubbleGeometry, bubbleMaterial);

  // Get world position of headBone
  const headWorldPos = new THREE.Vector3();
  headBone.getWorldPosition(headWorldPos);

  // Offset bubble
  bubbleMesh.position.copy(headWorldPos);
  bubbleMesh.position.x -= 0.8; 
  bubbleMesh.position.y += 0.5; 

  scene.add(bubbleMesh);
  bubbleMeshRef = bubbleMesh;

    let bubbleDirection = 1;
    let bubbleOffset = 0;

    function animateBubble() {
      requestAnimationFrame(animateBubble);

      bubbleOffset += 0.005 * bubbleDirection;
      if (bubbleOffset > 0.05 || bubbleOffset < -0.05) bubbleDirection *= -1;

      bubbleMesh.position.y = headWorldPos.y + 0.5 + bubbleOffset;
    }

    animateBubble();

  return bubbleMesh;
}

    );

function hexToRgb(hex) {
  if (typeof hex === 'number') {
    hex = hex.toString(16).padStart(6, '0');
  } else if (typeof hex === 'string') {
    hex = hex.replace('#', '');
  } else {
    return { r: 0, g: 0, b: 0 };
  }
  if (hex.length !== 6) {
    return { r: 0, g: 0, b: 0 };
  }
  const num = parseInt(hex, 16);
  return {
    r: (num >> 16) & 255,
    g: (num >> 8) & 255,
    b: num & 255
  };
}


function recolorIris(imageData) {
  const data = imageData.data;
  const white = { r: 255, g: 255, b: 255 };
  const brown = { r: 0x4C, g: 0x40, b: 0x32 };
  const eyeColor = hexToRgb(eyeColorHex);

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    if (colorMatchWithTolerance(r, g, b, 0, 255, 0)) {
      data[i] = white.r;
      data[i + 1] = white.g;
      data[i + 2] = white.b;

    } else if (colorMatchWithTolerance(r, g, b, 255, 0, 0)) {
      data[i] = brown.r;
      data[i + 1] = brown.g;
      data[i + 2] = brown.b;

    } else if (colorMatchWithTolerance(r, g, b, 0, 0, 255)) {
      data[i] = eyeColor.r;
      data[i + 1] = eyeColor.g;
      data[i + 2] = eyeColor.b;
    }
  }
}

function recolorMouth(imageData) {

  // 3. Check if requested index exists
  if (miiIndex < 0 || miiIndex >= keys.length) {

  const key = keys[miiIndex];

    const data = JSON.parse(raw);

    console.error("Failed to parse localStorage Mii:", key, err);

}

const PASSWORD = 'prpmaudio';
let audioBuffers = { male: [], female: [] };
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

/** Load voice pack from URL */
async function loadVoicePack(url) {
  try {
    const response = await fetch(url);
    const arrayBuffer = await response.arrayBuffer();
    const data = new Uint8Array(arrayBuffer);
    let offset = 0;
    audioBuffers = { male: [], female: [] };

    while (offset < data.length) {
      const nameLen = new DataView(data.buffer, offset, 4).getUint32(0, true);
      offset += 4;
      const nameBytes = data.slice(offset, offset + nameLen);
      offset += nameLen;
      const filename = new TextDecoder().decode(nameBytes);

      const iv = data.slice(offset, offset + 12);
      offset += 12;
      const dataLen = new DataView(data.buffer, offset, 4).getUint32(0, true);
      offset += 4;
      const encData = data.slice(offset, offset + dataLen);
      offset += dataLen;

      try {
        const decrypted = await decryptData(encData, iv, PASSWORD);
        const buffer = await audioCtx.decodeAudioData(decrypted.slice(0));
        const pixelBuffer = pixelateBuffer(buffer);

        if (filename.startsWith('male')) audioBuffers.male.push(pixelBuffer);
        else if (filename.startsWith('female')) audioBuffers.female.push(pixelBuffer);
      } catch (err) {
        console.error('Failed to decrypt', filename, err);
      }
    }
    console.log('Voice pack loaded!');
  } catch (err) {
    console.error('Failed to fetch voice pack:', err);
  }
}

/** AES-GCM decryption */
async function decryptData(encrypted, iv, password) {
  const pwUtf8 = new TextEncoder().encode(password);
  const pwHash = await crypto.subtle.digest('SHA-256', pwUtf8);
  const key = await crypto.subtle.importKey('raw', pwHash, { name: 'AES-GCM' }, false, ['decrypt']);
  return crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, encrypted);
}

/** Pixelate buffer for Tomodachi effect */
function pixelateBuffer(buffer, targetSampleRate = 11025, bitDepth = 2) {
  const length = Math.floor(buffer.length * targetSampleRate / buffer.sampleRate);
  const newBuffer = audioCtx.createBuffer(buffer.numberOfChannels, length, targetSampleRate);
  for (let c = 0; c < buffer.numberOfChannels; c++) {
    const oldData = buffer.getChannelData(c);
    const newData = newBuffer.getChannelData(c);
    for (let i = 0; i < length; i++) {
      let idx = Math.floor(i * buffer.sampleRate / targetSampleRate);
      let sample = oldData[idx];
      let step = 2 / (Math.pow(2, bitDepth));
      sample = Math.floor(sample / step) * step;
      newData[i] = sample;
    }
  }
  return newBuffer;
}

function playVoice(text, gender = 'male', voiceIndex = 0,face1,face2) {
    const buffers = audioBuffers[gender];
    if (!buffers || buffers.length === 0) { console.warn(`No voices loaded for ${gender}`); return 0; }
    if (voiceIndex >= buffers.length) { console.warn(`Voice index ${voiceIndex} not loaded.`); return 0; }

    const buffer = buffers[voiceIndex];

    let delay = 0;
    const spaceDelay = 0.1; // seconds for spaces
    const frameTime = 110; // milliseconds per mouth frame

    for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (char === ' ') {
            delay += spaceDelay;
            continue;
        }

        // Schedule mouth open
        setTimeout(() => { renderFace(face2); }, delay * 1000);

        // Schedule mouth close
        setTimeout(() => { renderFace(face1); }, delay * 1000 + frameTime);

        // Schedule the audio
        setTimeout(() => {
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start();
        }, delay * 1000);

        delay += 0.05;
    }

    return delay; // return total duration in seconds
}

let wasPlaying = false;

function resetBones(mesh) {
  if (!mesh || !mesh.skeleton) return;

  // Stop all animations completely
  if (bodyMixer) {
    bodyMixer.stopAllAction();
  }

  // Reset every bone manually to bind pose
  mesh.skeleton.bones.forEach((bone, i) => {
    const boneInverses = mesh.skeleton.boneInverses[i];

    bone.position.set(0, 0, 0);
    bone.quaternion.identity();
    bone.scale.set(1, 1, 1);

    // Apply inverse to go back to rest pose
    bone.applyMatrix4(boneInverses.clone().invert());
  });

  mesh.updateMatrixWorld(true);
}

function proceduralBite() {
  const head = bodyMesh.getObjectByName("head");
  const handR = bodyMesh.getObjectByName("armr1_h2");
  const handL = bodyMesh.getObjectByName("arml1_h2");
  const elbowR = bodyMesh.getObjectByName("armr2_h2");
  const elbowL = bodyMesh.getObjectByName("arm_l2_h2");

  if (!head || !handR || !handL || !elbowR || !elbowL) return;

  // --- Pose A: wind-up (slightly lift arms & tilt head) ---
  handR.rotation.set(0, 0.4, Math.PI - 0.4);
  elbowR.rotation.set(-0.2, -Math.PI + 0.2, 0);

  handL.rotation.set(0, 0.4, -Math.PI - 0.4);
  elbowL.rotation.set(0.3, -Math.PI + 0.3, 0);

  head.rotation.y = -0.1;

  setTimeout(() => {
    // --- Pose B: bite (full motion) ---
    handR.rotation.set(0, 0.8, Math.PI - 0.2);
    elbowR.rotation.set(-0.4, -Math.PI + 0.3, 0);

    handL.rotation.set(0, 0.8, -Math.PI - 0.2);
    elbowL.rotation.set(0.5, -Math.PI + 0.5, 0);

    head.rotation.y = -0.2;

    setTimeout(() => {
      // --- Pose C: relax (reset back to idle pose) ---
      handR.rotation.set(0, 0, Math.PI - 0.2);
      elbowR.rotation.set(-0.4, -Math.PI + 0.3, 0);

      handL.rotation.set(0, 0, -Math.PI - 0.2);
      elbowL.rotation.set(0.5, -Math.PI + 0.5, 0);

      head.rotation.y = 0;
    }, 300); // hold bite before reset
  }, 150); // delay to show wind-up
}
