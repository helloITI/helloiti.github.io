<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sprite Sheet Splitter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: #2a2a2a;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.6);
      text-align: center;
      max-width: 800px;
    }
    .sprites {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }
    canvas {
      max-width: 100%;
      image-rendering: pixelated;
      border: 1px solid #555;
      border-radius: 6px;
      background: #111;
    }
    button {
      margin-top: 10px;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Sprite Sheet Splitter</h2>
    <input type="file" id="fileInput" accept="image/*">
    <div id="sprites" class="sprites"></div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const spritesContainer = document.getElementById('sprites');

    fileInput.addEventListener('change', handleImage);

    function handleImage(event) {
      const file = event.target.files[0];
      if (!file) return;

      const img = new Image();
      img.onload = () => {
        const offCanvas = document.createElement('canvas');
        const ctx = offCanvas.getContext('2d');
        offCanvas.width = img.width;
        offCanvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        const imageData = ctx.getImageData(0, 0, img.width, img.height);
        const sprites = extractSprites(imageData);

        spritesContainer.innerHTML = "";
        sprites.forEach((sprite, i) => {
          const c = document.createElement('canvas');
          c.width = sprite.width;
          c.height = sprite.height;
          c.getContext('2d').putImageData(sprite.data, 0, 0);
          
          const btn = document.createElement('button');
          btn.textContent = `Download ${i+1}`;
          btn.onclick = () => downloadSprite(c, i+1);

          const wrapper = document.createElement('div');
          wrapper.style.textAlign = "center";
          wrapper.appendChild(c);
          wrapper.appendChild(btn);

          spritesContainer.appendChild(wrapper);
        });
      };
      img.src = URL.createObjectURL(file);
    }

    function extractSprites(imageData) {
      const { data, width, height } = imageData;
      const visited = new Uint8Array(width * height);
      const sprites = [];

      function getIndex(x, y) {
        return (y * width + x);
      }

      function isOpaque(x, y) {
        return data[(y * width + x) * 4 + 3] > 0;
      }

      function floodFill(sx, sy) {
        const stack = [[sx, sy]];
        let left = sx, right = sx, top = sy, bottom = sy;
        const pixels = [];

        while (stack.length) {
          const [x, y] = stack.pop();
          const idx = getIndex(x, y);
          if (visited[idx]) continue;
          visited[idx] = 1;

          if (!isOpaque(x, y)) continue;

          pixels.push([x, y]);
          if (x < left) left = x;
          if (x > right) right = x;
          if (y < top) top = y;
          if (y > bottom) bottom = y;

          // 4-neighbors
          if (x > 0) stack.push([x-1, y]);
          if (x < width-1) stack.push([x+1, y]);
          if (y > 0) stack.push([x, y-1]);
          if (y < height-1) stack.push([x, y+1]);
        }

        if (pixels.length === 0) return null;

        const w = right - left + 1;
        const h = bottom - top + 1;
        const spriteData = ctx.createImageData(w, h);

        pixels.forEach(([x, y]) => {
          const srcIndex = (y * width + x) * 4;
          const dstIndex = ((y - top) * w + (x - left)) * 4;
          for (let i=0; i<4; i++) {
            spriteData.data[dstIndex + i] = data[srcIndex + i];
          }
        });

        return { data: spriteData, width: w, height: h };
      }

      const ctx = document.createElement('canvas').getContext('2d');
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          if (!visited[getIndex(x, y)] && isOpaque(x, y)) {
            const sprite = floodFill(x, y);
            if (sprite) sprites.push(sprite);
          }
        }
      }
      return sprites;
    }

    function downloadSprite(canvas, index) {
      const link = document.createElement('a');
      link.download = `sprite-${index}.png`;
      link.href = canvas.toDataURL();
      link.click();
    }
  </script>
</body>
</html>
