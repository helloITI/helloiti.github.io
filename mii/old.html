button:active {

}


        
        .card {

            gap: 10px;

        .card img {

        table {

        #miiPopup, #miiPopup1, #miiPopup2 {

            background: rgba(0,0,0,.75);

            align-items: center;
            z-index: 9999;

        #miiPopup1, #miiPopup2 {
            pointer-events: none;

        .popup-box {
            pointer-events: auto;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            max-width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,.2);
        }
        
        body.dark .popup-box {
            background: #111;
            color: #eee;
            box-shadow: 0 4px 20px rgba(0,0,0,.6);

        .popup-box button {
            margin-top: 10px;
            padding: 6px 14px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;

        .popup-box button:hover {

        }
        
        #themeToggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: #333;
            color: #fff;
            border: 1px solid #555;

        body.dark #themeToggle {
            background: #ccc;
            color: #000;
            border: 1px solid #aaa;

        body.dark #themeToggle:hover {

        #globalInfoBtn {
            position: absolute;

            border: 1px solid #555;

            cursor: pointer;

        body.dark #globalInfoBtn {
            background: #ccc;
            color: #000;
            border: 1px solid #aaa;
        }
        #MeWhen {
            color: black;
        }
        body.dark #MeWhen {
            color: white;
        }
    </style>
</head>

<body>

    <center><h2>※⁜ welcome to mii storage! ⁜※</h2>
    <h4>⁜ here, you can save your .charinfo or .ffsd mii's just in a website! isn't that cool? ⁜</h4></center>
    
    <a href="https://hellot.nekoweb.org/" id="MeWhen"
       style="position: absolute; top: 10px; right: 10px; font-size: 12px; text-decoration: none;">
       Go Back?
    </a>

    <center><input type="file" id="file" accept=".charinfo,.ffsd"></center>
    
    <center><h2>※⁜ saved mii's! ⁜※</h2></center>
    <div id="list"></div>
    
    <div id="miiPopup">
        <div class="popup-box">
            <img id="popupImg" style="max-width:100%; height:auto; border-radius:8px;">
            <br>
            <button onclick="document.getElementById('miiPopup').style.display='none'"> ※⁜ close ⁜※ </button>
        </div>
    </div>
    
    <div id="miiPopup1">
        <div class="popup-box" id="pantsInfoBox"></div>
    </div>
    
    <div id="miiPopup2">
        <div class="popup-box" id="globalInfoBox"></div>
    </div>
    
    <button id="globalInfoBtn" onclick="showGlobalInfo()">※⁜ credits ⁜※</button>
    
    <button id="themeToggle">※⁜ dark mode ⁜※</button>
    
    <audio id="bgm" loop>
        <source src="https://file.garden/aRzXHaa7jkbrRXjj/0.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    
    <script>
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark');
            themeToggle.textContent = '※⁜ light mode ⁜※';
        } else {
            themeToggle.textContent = '※⁜ dark mode ⁜※';
        }
        
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');
            themeToggle.textContent = isDark ? '※⁜ light mode ⁜※' : '※⁜ dark mode ⁜※';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
        
        document.addEventListener("click", function playMusic() {
            const audio = document.getElementById("bgm");
            audio.play().catch(() => {});
            document.removeEventListener("click", playMusic);
        });
        
        function showGlobalInfo() {
            document.getElementById("miiPopup2").style.display = "flex";
            document.getElementById("globalInfoBox").innerHTML = `
                <div style="font-size:14px; text-align:left; padding:8px;">
                    <b>※⁜ credits! ⁜※</b><br><br>
                    • <a href="https://discord.com/users/1277753820713324675">helloT</a> for making the entire html 
                    <h5 style="display:inline; margin:0; padding:0;">🤣</h5><br>
                    • <a href="https://discord.com/users/1406637354709549057">helloT seal</a> for simply just existing here 
                    <h5 style="display:inline; margin:0; padding:0;">
                      <img src="https://hellot.nekoweb.org/assets/deez.png" style="width:18px; vertical-align:middle;">
                    </h5><br>
                    • <a href="https://www.youtube.com/@objecty">objecty</a> for the background music!<br>
                    • <a href="https://mii-unsecure.ariankordi.net">Mii Renderer (REAL)</a> for the Mii Renders<br>
                    <button onclick="document.getElementById('miiPopup2').style.display='none'" 
                            style="margin-top:10px; padding:6px 14px; background:#222; color:#fff; border:1px solid #444; border-radius:6px; cursor:pointer;">
                        ※⁜ close ⁜※
                    </button>
                </div>
            `;
        }
        
        function showPantsInfo() {
            document.getElementById("miiPopup1").style.display = "flex";
            document.getElementById("pantsInfoBox").innerHTML = `
                <div style="font-size:14px; text-align:left; padding:8px;">
                    ※⁜ you may be wondering why is there a "※⁜ pants ⁜※" value on charinfo mii's... ⁜※<br><br>
                    ⁜ well, you see, charinfo has a normal pants and special pants (※ aka gold pants ※) state ⁜<br>
                    ※ which you can get by hex editing any charinfo mii! ※<br>
                    ⁜ here are some hex codes for the uh... charinfo mii to make it special<br>
                    (you need to figure out wheres the pants value) ⁜<br><br>
                    00 = ※⁜ normal pants ⁜※<br>
                    01 = ※⁜ special pants ⁜※ (⁜ gold pants ⁜)<br><br>
                    ※ and here is some charinfo examples that you can download: ※<br><br>
                    <a href="https://hellot.nekoweb.org/mii/Gold_Male.charinfo">⁜ example 1 ⁜</a><br>
                    <a href="https://hellot.nekoweb.org/mii/Gold_Girl.charinfo">⁜ example 2 ⁜</a><br><br>
                    ⁜ <b>note:</b> these examples WON'T work on real nintendo switches, they work on this tool (that you are currently using right now)<br>
                    <a href="https://mii-unsecure.ariankordi.net">Mii Renderer (REAL)</a><br> 
                    (won't show up the gold pants as long you render the mii's pants to gold)<br>
                    and <a href="https://mii.nxw.pw">Mii Creator</a><br>
                    (the gold pants will also not show up, but as long you set the mii's type to "special")⁜<br><br>
                    ※⁜ also... ever wanted to have a <b>tutorial</b> to make your charinfo mii have gold pants?<br>
                    go check this <a href="https://hellot.nekoweb.org/mii/tutorial">one!</a> ⁜※<br>
                    <button onclick="closePopup1()" style="margin-top:5px; padding:5px 12px; background:#222; color:white; border:1px solid #444;">
                        ※⁜ close ⁜※
                    </button>
                </div>
            `;
        }
        
        function closePopup1() {
            document.getElementById("miiPopup1").style.display = "none";
        }
        
        const CHARINFO_ATTRS = [
            { off: 16, len: 22, name: '※⁜ nickname ⁜※', type: 'utf16' },
            { off: 40, name: '※⁜ gender ⁜※', type: 'u8' },
            { off: 39, name: '※⁜ favorite color ⁜※', type: 'u8' },
            { off: 41, name: '※⁜ height ⁜※', type: 'u8' },
            { off: 42, name: '※⁜ weight ⁜※', type: 'u8' },
            { off: 43, name: '※⁜ pants ⁜※', type: 'u8' }
        ];
        
        const FAVORITE_COLORS = [
            "⁜ red ⁜", "⁜ orange ⁜", "⁜ yellow ⁜", "⁜ green ⁜", "⁜ lime green ⁜", "⁜ blue ⁜",
            "⁜ light blue ⁜", "⁜ pink ⁜", "⁜ purple ⁜", "⁜ brown ⁜", "⁜ white ⁜", "⁜ black ⁜"
        ];
        
        const PANTS_COLORS = {
            0: "⁜ normal ⁜",
            1: "⁜ special ⁜"
        };
        
        function hexToBytes(hex) {
            return new Uint8Array(hex.match(/.{2}/g).map(b => parseInt(b, 16)));
        }
        
        function saveList() {
            const store = list.map(m => ({ id: m.id, dataHex: m.dataHex, ext: m.ext }));
            localStorage.setItem("miis", JSON.stringify(store));
        }
        
        function parseFFSDText(buf) {
            try {
                const dec = new TextDecoder("utf-16le").decode(buf);
                let seq = [], cur = '';
                for (let c of dec) {
                    if (/[\w\s.,'"-]/.test(c)) cur += c;
                    else {
                        if (cur.length >= 2) seq.push(cur.trim());
                        cur = '';
                    }
                }
                if (cur.length >= 2) seq.push(cur.trim());
                return {
                    nickname: seq[0] || "Mii",
                    creator: seq[1] || "Unknown"
                };
            } catch {
                return { nickname: "Mii", creator: "Unknown" };
            }
        }
        
        function parseMiiInfo(buf, ext) {
            const info = {};
            if (ext === "charinfo") {
                CHARINFO_ATTRS.forEach(a => {
                    if (a.type === "utf16") {
                        info[a.name] = new TextDecoder("utf-16le")
                            .decode(buf.slice(a.off, a.off + (a.len || 0)))
                            .replace(/\0/g, '').replace(/�/g, "").trim();
                    } else {
                        info[a.name] = buf[a.off];
                    }
                });
                info["※⁜ gender ⁜※"] = info["※⁜ gender ⁜※"] === 0 ? "⁜ male ⁜" :
                    info["※⁜ gender ⁜※"] === 1 ? "⁜ female ⁜" : "Unknown";
                info["※⁜ favorite color ⁜※"] = FAVORITE_COLORS[info["※⁜ favorite color ⁜※"]] || "Unknown";
                info["※⁜ pants ⁜※"] = PANTS_COLORS[info["※⁜ pants ⁜※"]] || "Unknown";
                info["※⁜ creator's name ⁜※"] = "Unknown";
                if (!info["※⁜ nickname ⁜※"]) info["※⁜ nickname ⁜※"] = "Mii";
            } else {
                const t = parseFFSDText(buf);
                info["※⁜ nickname ⁜※"] = t.nickname;
                info["※⁜ creator's name ⁜※"] = t.creator;
                info["※⁜ pants ⁜※"] = "Unknown";
                info["※⁜ height ⁜※"] = "Unknown";
                info["※⁜ weight ⁜※"] = "Unknown";
                const personal = buf[0x18] + (buf[0x19] << 8);
                const colIndex = (personal >> 10) & 0xF;
                info["※⁜ favorite color ⁜※"] = (colIndex >= 0 && colIndex < FAVORITE_COLORS.length) ?
                    FAVORITE_COLORS[colIndex] : "Unknown";
                const genderIndex = personal & 1;
                info["※⁜ gender ⁜※"] = genderIndex === 0 ? "⁜ male ⁜" : "⁜ female ⁜";
            }
            return info;
        }
        
        function render() {
            const wrap = document.getElementById("list");
            wrap.innerHTML = "";
            list.forEach(m => {
                const info = parseMiiInfo(m.data, m.ext);
                const div = document.createElement("div");
                div.className = "card";
                const pantsParam = (m.ext === "charinfo" && info["※⁜ pants ⁜※"] === "⁜ special ⁜") ? "gold" : "gray";
                const charFace = `https://mii-unsecure.ariankordi.net/miis/image.png?data=${m.dataHex}&shaderType=switch&type=face&width=270&pantsColor=${pantsParam}&bodyType=switch`;
                const charFull = `https://mii-unsecure.ariankordi.net/miis/image.png?data=${m.dataHex}&shaderType=switch&type=all_body_sugar&width=270&pantsColor=${pantsParam}&bodyType=switch`;
                const ffsdFace = `https://mii-unsecure.ariankordi.net/miis/image.png?data=${m.dataHex}&type=face&width=270&pantsColor=gray&bodyType=wiiu`;
                const ffsdFull = `https://mii-unsecure.ariankordi.net/miis/image.png?data=${m.dataHex}&type=all_body_sugar&width=270&pantsColor=gray&bodyType=wiiu`;
                const faceURL = (m.ext === "charinfo") ? charFace : ffsdFace;
                const fullBodyURL = (m.ext === "charinfo") ? charFull : ffsdFull;
                
                const img = document.createElement("img");
                img.src = faceURL;
                img.onclick = () => {
                    document.getElementById("popupImg").src = fullBodyURL;
                    document.getElementById("miiPopup").style.display = "flex";
                };
                
                const meta = document.createElement("div");
                const goldBadge = (m.ext === "charinfo" && info["※⁜ pants ⁜※"] === "⁜ special ⁜") ? " ⭐" : "";
                let t = "<table><tr><th>Attribute</th><th>Value</th></tr>";
                for (const k in info) {
                    if (m.ext === "charinfo" && k === "※⁜ creator's name ⁜※") continue;
                    if (m.ext === "ffsd" && ["※⁜ pants ⁜※", "※⁜ height ⁜※", "※⁜ weight ⁜※"].includes(k)) continue;
                    t += `<tr><td>${k}</td><td>${info[k]}</td></tr>`;
                }
                t += "</table>";
                const pantsInfo = m.ext === "charinfo" ? 
                    `<button style="background:#222; color:#fff; border:1px solid #555; cursor:pointer; padding:2px 6px; border-radius:6px; font-size:12px;" onclick="showPantsInfo()">?</button>` : "";
                meta.innerHTML = `<div style="font-weight:600">${info["※⁜ nickname ⁜※"]}${goldBadge} ${pantsInfo}</div>` + t;
                
                const del = document.createElement("button");
                del.textContent = "※⁜ remove ⁜※";
                del.style.cssText = "background:#c33; color:#fff; border:1px solid #a00; cursor:pointer; padding:4px 8px; border-radius:6px; font-size:12px;";
                del.onclick = () => {
                    list = list.filter(x => x.id !== m.id);
                    saveList();
                    render();
                };
                
                div.append(img, meta, del);
                wrap.append(div);
            });
        }
        
        let list = (JSON.parse(localStorage.getItem("miis") || "[]"))
            .map(m => ({ ...m, data: hexToBytes(m.dataHex) }));
        
        document.getElementById("file").onchange = async e => {
            const f = e.target.files[0];
            if (!f) return;
            const ext = f.name.split(".").pop().toLowerCase();
            if (ext !== "charinfo" && ext !== "ffsd") return alert("※⁜ please use .charinfo or .ffsd mii files only! ⁜※");
            const buf = new Uint8Array(await f.arrayBuffer());
            const hex = Array.from(buf).map(x => x.toString(16).padStart(2, "0")).join("");
            list.push({ id: Date.now(), data: buf, dataHex: hex, ext });
            saveList();
            render();
        };
        
        render();
    </script>
    
</body>
