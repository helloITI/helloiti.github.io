<center>
<h1> Welcome to Mii Storage! </h1>

<a href="https://helloiti.github.io/" id="mw"
   style="position: absolute; top: 10px; right: 10px; font-size: 12px; text-decoration: none;">
   Go Back?

<center><input type="file" id="fl" accept=".charinfo,.ffsd"></center>
<center>
<h3><i>Or...</i><br>
You can also import your raw Mii HEX data!</h3>
<h4><i></i></h4>
<textarea id="hx" placeholder="Paste your CHARINFO/FFSD's HEX data here..."
          style="width:45%; height:80px; margin:5px; font-family:monospace;"></textarea><br>
<button id="ih" style="max-width:100% !important; height:auto !important; border-radius:8px !important;">Import</button>
</center>
<center><h2>Saved Miis:</h2></center>
<div id="ls"></div>

    <div class="pp">
        <img id="pi" style="max-width:100%; height:auto; border-radius:8px;">
        <br>
        <button onclick="document.getElementById('mp').style.display='none'"> ※ Close ※ </button>
    </div>
</div>
<div id="mp1">
    <div class="pp" id="pt"></div>
</div>
<div id="mp2">
    <div class="pp" id="cr"></div>
</div>
<button id="gi" onclick="sg()">Credits</button>
<button id="dl">※ Dark Mode ※</button>
<audio id="bg" loop>
    <source src="https://helloiti.github.io/assets/dwnmng.mp3" type="audio/mpeg">
</audio>
