<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Avatar Character</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <meta property="og:title" content="My Avatar Editor" />
  <meta property="og:description" content="Create and edit personalized avatar characters compatible with Mii™ characters found on the Nintendo® Wii™" />
  <meta property="og:url" content="https://helloiti.github.io/mae/" />
  <meta property="og:image" content="https://helloiti.github.io/mae/favicon.png" />
  <meta property="og:type" content="website" />
  <style>
    html, body, #avatarSWFContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      border: none;
    }
        @font-face {
      font-family: 'NintendoNTLG';
      src: url('https://helloiti.github.io/assets/nintendo_NTLG-DB_002.ttf') format('truetype'); /* ttf file name too long so i pasted it 🤣🤣🤣 me is funny */
      /* normal weight... i think? */
      font-weight: normal;
      font-style: normal;
    }
body {
  font-family: 'NintendoNTLG', sans-serif;
  margin: 0;
  padding: 0;
  /* bg */
  color: white;
  overflow: hidden; /* disables scrolling around the page completely */
  display: flex;
  flex-direction: column;
  align-items: center;
}
body::-webkit-scrollbar { display: none; }
    a {
      text-decoration: none;
      background-size: 400% 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
	  html {
  overflow: hidden;
}
  </style>
  <!-- Ruffle -->
  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
      autoplay: "on",
      unmuteOverlay: "hidden"
    };
  </script>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <!-- SWFObject -->
  <script src="https://helloiti.github.io/mae/scripts/swfobject.js"></script>
  <script src="https://helloiti.github.io/mae/scripts/utils.js"></script>
  <script>
    // ok
    window.addEventListener("DOMContentLoaded", () => {
      swfobject.embedSWF(
        "https://helloiti.github.io/mae/myavatarcharacter.swf",
        "avatarSWFContainer",
        "100%",
        "100%",
        "10.0.0",
        null,
        getQueryObj()
      );
    });
  </script>
</head>
